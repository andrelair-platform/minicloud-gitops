apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-demo-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minicloud-platform
  source:
    repoURL: https://github.com/andrelair-platform/minicloud-gitops.git
    targetRevision: main
    path: services/platform-demo/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-demo-dev
  syncPolicy:
    # Dev auto-syncs on every CI push — CI updates overlays/dev/kustomization.yaml
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: platform-demo
      namespace: platform-demo-dev
      jqPathExpressions:
        - .spec.replicas
