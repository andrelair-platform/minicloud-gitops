---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: erpnext
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minicloud-platform
  sources:
    - repoURL: https://helm.erpnext.com
      chart: erpnext
      targetRevision: 8.0.67
      helm:
        valueFiles:
          - $values/helm-values/erpnext-values.yaml
    - repoURL: https://github.com/andrelair-platform/minicloud-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/andrelair-platform/minicloud-gitops.git
      targetRevision: main
      path: manifests/erpnext
  destination:
    server: https://kubernetes.default.svc
    namespace: erp
  ignoreDifferences:
    # ESO owns the erpnext Secret (mariadb-root-password). Helm renders a
    # placeholder stringData value — ignore it so ESO wins field ownership.
    - group: ""
      kind: Secret
      name: erpnext
      jsonPointers:
        - /data
    # Jobs get timestamp annotations on each render — ignore to stop restart loop
    - group: batch
      kind: Job
      jsonPointers:
        - /spec/template/metadata
        - /spec/selector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
