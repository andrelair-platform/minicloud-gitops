apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minicloud-platform
  source:
    repoURL: https://github.com/andrelair-platform/minicloud-gitops.git
    targetRevision: main
    path: services/platform-demo/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-demo
  syncPolicy:
    # Production sync is intentionally manual — no automated promotion.
    # To deploy: bump newTag in overlays/prod/kustomization.yaml via PR,
    # then click Sync in ArgoCD UI or run: argocd app sync platform-demo
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      name: platform-demo
      namespace: gitops-demo
      jqPathExpressions:
        - .spec.replicas
        - .spec.template.metadata.annotations
