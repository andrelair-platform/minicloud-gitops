apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ktayl-solution-web
  namespace: argocd
spec:
  project: minicloud-platform
  source:
    repoURL: https://github.com/andrelair-platform/minicloud-gitops
    targetRevision: HEAD
    path: manifests/ktayl-solution-web
    verifySignature: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ktayl-web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
