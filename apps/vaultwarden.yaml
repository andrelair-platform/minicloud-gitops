---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
spec:
  project: minicloud-platform
  source:
    repoURL: https://github.com/andrelair-platform/minicloud-gitops
    targetRevision: main
    path: manifests/vaultwarden
  destination:
    server: https://kubernetes.default.svc
    namespace: vaultwarden
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
  ignoreDifferences:
    # ESO ExternalSecret status is managed by the controller; ArgoCD should not track it
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
