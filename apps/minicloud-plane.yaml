apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minicloud-plane-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minicloud-platform
  source:
    repoURL: https://github.com/andrelair-platform/minicloud-gitops.git
    targetRevision: main
    path: services/minicloud-plane/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: minicloud-plane-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
