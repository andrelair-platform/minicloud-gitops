apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-demo-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minicloud-platform
  source:
    repoURL: https://github.com/andrelair-platform/minicloud-gitops.git
    targetRevision: main
    path: services/platform-demo/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-demo-staging
  syncPolicy:
    # Staging sync is manual — promote by opening a PR bumping the tag in
    # overlays/staging/kustomization.yaml, then sync in ArgoCD UI.
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: platform-demo
      namespace: platform-demo-staging
      jqPathExpressions:
        - .spec.replicas
