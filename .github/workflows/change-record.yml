name: Create Change Record on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  change-record:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Extract change classification from PR body
        id: classify
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Detect change type from checked checkboxes in PR template
          if echo "$PR_BODY" | grep -q '\- \[x\] `emergency`'; then
            echo "change_type=emergency" >> $GITHUB_OUTPUT
          elif echo "$PR_BODY" | grep -q '\- \[x\] `normal`'; then
            echo "change_type=normal" >> $GITHUB_OUTPUT
          else
            echo "change_type=standard" >> $GITHUB_OUTPUT
          fi

          if echo "$PR_BODY" | grep -q '\- \[x\] `high`'; then
            echo "risk=high" >> $GITHUB_OUTPUT
          elif echo "$PR_BODY" | grep -q '\- \[x\] `medium`'; then
            echo "risk=medium" >> $GITHUB_OUTPUT
          else
            echo "risk=low" >> $GITHUB_OUTPUT
          fi

      - name: Create change record issue
        uses: actions/github-script@v7
        env:
          CHANGE_TYPE: ${{ steps.classify.outputs.change_type }}
          RISK: ${{ steps.classify.outputs.risk }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const mergedAt = new Date(pr.merged_at);
            const dateStr = mergedAt.toISOString().split('T')[0];
            const timeStr = mergedAt.toISOString().split('T')[1].slice(0, 5) + ' UTC';
            const changeType = process.env.CHANGE_TYPE;
            const risk = process.env.RISK;

            const body = [
              '## Change Record',
              '',
              `**PR:** [#${pr.number} — ${pr.title}](${pr.html_url})`,
              `**Merged by:** @${pr.merged_by.login}`,
              `**Date:** ${dateStr} at ${timeStr}`,
              `**Change type:** ${changeType}`,
              `**Risk level:** ${risk}`,
              `**Files changed:** ${pr.changed_files} | **Commits:** ${pr.commits}`,
              '',
              '---',
              '',
              '## PR Description',
              '',
              pr.body || '_No description provided._',
              '',
              '---',
              '',
              '## Post-Change Verification',
              '',
              '- [ ] ArgoCD app(s) Synced + Healthy',
              '- [ ] No new Gatekeeper violations',
              '- [ ] Relevant pods Running / Ready',
              '- [ ] Regression check passed (if applicable)',
              '',
              '---',
              '',
              `_Auto-generated by GitHub Actions on merge of PR #${pr.number}_`,
            ].join('\n');

            const labels = ['change-record', `change-type: ${changeType}`, `risk: ${risk}`];

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CHANGE] ${dateStr} — ${pr.title}`,
              body: body,
              labels: labels,
            });

            core.info(`Change record created: ${issue.data.html_url}`);
