apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: open-webui
  description: |
    Open WebUI — AI chat interface for the platform. Routes all
    inference through the LiteLLM AI Gateway (Groq, OpenAI, DeepSeek,
    Claude, Ollama local models). OIDC login via Authentik. Supports
    RAG (bge-m3 embeddings, hybrid BM25 + HNSW search), web search
    via SearXNG, and multi-model selection.
