apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: event-demo
  description: |
    KEDA + NATS JetStream scale-to-zero demo (Phase 17). The echo-worker
    Deployment starts at 0 replicas; KEDA scales it up when messages land
    in the JOBS/echo-workers consumer and back to 0 when the queue drains.
    End-to-end latency from publish to pod-ready is ~8 s at 0 replicas.
  annotations:
    backstage.io/source-location: url:https://github.com/andrelair-platform/minicloud-gitops
    github.com/project-slug: andrelair-platform/minicloud-gitops
    argocd/app-name: event-demo
    backstage.io/kubernetes-id: echo-worker
  tags:
    - keda
    - nats
    - demo
    - phase-17
    - scale-to-zero
  links:
    - url: https://argocd.devandre.sbs/applications/event-demo
      title: ArgoCD Application
      icon: dashboard
    - url: https://andrelair-platform.github.io/minicloud-platform-docs/platform-roadmap/phase-17-keda
      title: Phase 17 documentation
      icon: docs
spec:
  type: service
  lifecycle: production
  owner: andrelair-platform
  system: minicloud-platform
