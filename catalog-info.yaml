apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ollama
  description: |
    Ollama — local LLM inference server. Three instances: primary
    (fast-heron, 9 models including qwen3.5:4b, phi4-mini, deepseek-r1),
    secondary (star-kitten, same models), tertiary (fast-skunk, light
    models). Serves the LiteLLM AI Gateway. CPU-only inference on
    i7-8565U / i7-10510U ThinkPads.
  annotations:
    backstage.io/source-location: url:https://github.com/andrelair-platform/minicloud-gitops
