apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minicloud-plane-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minicloud-plane-secrets
    creationPolicy: Owner
  data:
    - secretKey: PLANE_URL
      remoteRef:
        key: secret/platform/minicloud-plane
        property: PLANE_URL
    - secretKey: PLANE_TOKEN
      remoteRef:
        key: secret/platform/minicloud-plane
        property: PLANE_TOKEN
    - secretKey: PLANE_WORKSPACE
      remoteRef:
        key: secret/platform/minicloud-plane
        property: PLANE_WORKSPACE
    - secretKey: PLANE_WEBHOOK_SECRET
      remoteRef:
        key: secret/platform/minicloud-plane
        property: PLANE_WEBHOOK_SECRET
