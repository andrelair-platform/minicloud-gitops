# Replace SERVICE_NAME with your service name throughout this file.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: SERVICE_NAME
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  labels:
    app: SERVICE_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: SERVICE_NAME
  template:
    metadata:
      labels:
        app: SERVICE_NAME
        backstage.io/kubernetes-id: SERVICE_NAME
    spec:
      serviceAccountName: SERVICE_NAME
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: SERVICE_NAME
          # Tag set per overlay via images: block — never hardcode here.
          image: harbor.10.0.0.200.nip.io/library/SERVICE_NAME:placeholder
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 10
            periodSeconds: 30
