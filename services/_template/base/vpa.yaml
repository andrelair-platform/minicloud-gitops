apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: SERVICE_NAME
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: SERVICE_NAME
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: SERVICE_NAME
        minAllowed:
          cpu: 10m
          memory: 16Mi
        maxAllowed:
          cpu: "2"
          memory: 512Mi
