apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo
  labels:
    app: platform-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-demo
  template:
    metadata:
      labels:
        app: platform-demo
        backstage.io/kubernetes-id: platform-demo
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "platform-demo"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/platform-demo/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/platform-demo/config" -}}
          API_KEY={{ .Data.data.api_key }}
          ENVIRONMENT={{ .Data.data.environment }}
          LOG_LEVEL={{ .Data.data.log_level }}
          {{- end }}
        vault.hashicorp.com/agent-run-as-non-root: "true"
        vault.hashicorp.com/agent-run-as-user: "1000"
    spec:
      serviceAccountName: platform-demo
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: platform-demo
                topologyKey: kubernetes.io/hostname
      containers:
        - name: platform-demo
          # Image tag is not set here — each overlay pins its own tag via
          # the images: block in kustomization.yaml. This prevents a single
          # CI push from promoting to staging and prod simultaneously.
          image: harbor.10.0.0.200.nip.io/library/platform-demo:placeholder
          ports:
            - containerPort: 9898
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
