apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: platform-demo-cron-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-demo
  minReplicaCount: 0
  maxReplicaCount: 2
  cooldownPeriod: 60
  triggers:
    - type: cron
      metadata:
        timezone: Europe/Paris
        start: "0 8 * * 1-5"
        end: "0 19 * * 1-5"
        desiredReplicas: "2"
