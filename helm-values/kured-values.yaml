configuration:
  # All-day reboot window — portfolio cluster, no business-hours restriction
  startTime: "0:00"
  endTime: "23:59"
  timeZone: "Europe/Paris"
  # Check for /var/run/reboot-required every hour
  period: 1h
  # drainTimeout: 0 = unlimited wait. Longhorn PDB blocks eviction until
  # Longhorn rebalances replicas off the draining node (typically 60-120s).
  # Gatekeeper PDB does the same. With a hard timeout kured gives up and
  # retries in 1h; with 0 it just waits until PDBs are satisfied.
  drainTimeout: 0
  # Use pod's own terminationGracePeriodSeconds — don't cut it short
  drainGracePeriod: -1

# Tolerate control-plane taint so kured runs on set-hog too
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# kured needs hostPID to nsenter into host PID 1 for systemctl reboot
hostPID: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations:
  # Disable vault-agent injection — kured has no secrets to fetch
  vault.hashicorp.com/agent-inject: "false"
