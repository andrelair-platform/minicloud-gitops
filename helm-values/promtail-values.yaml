config:
  clients:
  - url: http://loki.observability.svc:3100/loki/api/v1/push
  positions:
    filename: /run/promtail/positions.yaml
  serverPort: 3101
  snippets:
    extraScrapeConfigs: ""
    pipelineStages:
    - cri: {}
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi
serviceMonitor:
  enabled: true
tolerations:
- effect: NoSchedule
  operator: Exists
- effect: NoExecute
  operator: Exists
