global:
  domain: argocd.10.0.0.200.nip.io

# Phase 15: TLS terminated at the NGINX Ingress, cert from cert-manager.
# Keep server.insecure: true so argocd-server speaks plain HTTP internally
# (the cluster traffic Ingress -> argocd-server stays inside the cluster);
# the public-facing TLS handshake happens at the Ingress.
configs:
  params:
    server.insecure: true
  cm:
    # Enable resource exclusions / inclusions later if needed
    timeout.reconciliation: 180s
    resource.customizations.health.argoproj.io_Rollout: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.phase == "Degraded" then
          hs.status = "Degraded"
          hs.message = obj.status.message
        elseif obj.status.phase == "Paused" then
          hs.status = "Suspended"
          hs.message = "Rollout is paused"
        elseif obj.status.readyReplicas == obj.spec.replicas then
          hs.status = "Healthy"
          hs.message = "Rollout is healthy"
        else
          hs.status = "Progressing"
          hs.message = "Waiting for rollout to finish"
        end
      else
        hs.status = "Progressing"
        hs.message = "Waiting for rollout status"
      end
      return hs
    # Disable local admin — OIDC (Authentik) is the only login path.
    # Break-glass: kubectl --context minicloud-break-glass + kubectl exec into argocd-server.
    admin.enabled: "false"
    # GPG commit signature verification — key FD6D39D681DEFA34 (AndreLiar, expires 2028-06-28)
    gpg.enabled: "true"
    # Phase 23 Stage 3 — Authentik OIDC integration
