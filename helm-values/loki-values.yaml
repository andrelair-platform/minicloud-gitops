backend:
  replicas: 0
chunksCache:
  enabled: false
deploymentMode: SingleBinary
gateway:
  enabled: false
loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1
  compactor:
    delete_request_store: filesystem
    retention_delete_delay: 2h
    retention_enabled: true
    working_directory: /var/loki/compactor
  limits_config:
    allow_structured_metadata: true
    retention_period: 168h
    volume_enabled: true
  schemaConfig:
    configs:
    - from: "2025-01-01"
      index:
        period: 24h
        prefix: loki_index_
      object_store: filesystem
      schema: v13
      store: tsdb
  storage:
    type: filesystem
lokiCanary:
  enabled: false
minio:
  enabled: false
monitoring:
  lokiCanary:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: true
read:
  replicas: 0
resultsCache:
  enabled: false
singleBinary:
  persistence:
    accessModes:
    - ReadWriteOnce
    enabled: true
    size: 30Gi
    storageClass: longhorn
  replicas: 1
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
test:
  enabled: false
write:
  replicas: 0
