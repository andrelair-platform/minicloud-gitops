backend:
  replicas: 0
chunksCache:
  enabled: false
deploymentMode: SingleBinary
gateway:
  enabled: false
loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1
  compactor:
    delete_request_store: filesystem
    retention_delete_delay: 2h
    retention_enabled: true
    working_directory: /var/loki/compactor
  limits_config:
    allow_structured_metadata: true
    retention_period: 168h
    volume_enabled: true
    # Promote OTel resource attributes to Loki stream labels when logs arrive
    # via the OTLP endpoint (/otlp/v1/logs) from the OTel Collector DaemonSet.
    # Short-name attributes (namespace, pod, etc.) are set by the OTel
    # transformprocessor to maintain backward compatibility with Promtail labels
    # and existing Grafana dashboards.
    otlp_config:
      resource_attributes:
        attributes_config:
          - action: index_label
            attributes:
              - namespace
              - pod
              - node_name
              - container
              - app
              - job
      log_attributes:
        - action: index_label
          attributes:
            - level
  schemaConfig:
    configs:
    - from: "2025-01-01"
      index:
        period: 24h
        prefix: loki_index_
      object_store: filesystem
      schema: v13
      store: tsdb
  storage:
    type: filesystem
lokiCanary:
  enabled: false
minio:
  enabled: false
monitoring:
  lokiCanary:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: true
read:
  replicas: 0
resultsCache:
  enabled: false
singleBinary:
  persistence:
    accessModes:
    - ReadWriteOnce
    enabled: true
    size: 30Gi
    storageClass: longhorn
  replicas: 1
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  # Pass alertmanager URL via CLI flag: the Loki chart v7.0.0 generates the
  # ruler: config block in its Helm template and overwrites any loki.ruler.*
  # values set in values.yaml. The -ruler.alertmanager-url flag bypasses this.
  extraArgs:
    - -ruler.alertmanager-url=http://kps-alertmanager.monitoring.svc:9093
  # Mount loki-rules ConfigMap at /var/loki/rules/fake/ — the path the ruler
  # uses with auth_enabled:false (tenant "fake") and ruler.storage.local.directory
  # defaulting to /var/loki/rules (from common.storage.filesystem.rules_directory).
  # /var/loki is the PVC mount; /var/loki/rules/fake is a subdirectory overlay.
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /var/loki/rules/fake
      readOnly: true
test:
  enabled: false
write:
  replicas: 0
