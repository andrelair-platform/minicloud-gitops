backend:
  replicas: 0
chunksCache:
  enabled: false
deploymentMode: SingleBinary
gateway:
  enabled: false
loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1
  compactor:
    delete_request_store: filesystem
    retention_delete_delay: 2h
    retention_enabled: true
    working_directory: /var/loki/compactor
  limits_config:
    allow_structured_metadata: true
    retention_period: 168h
    volume_enabled: true
    # Promote OTel resource attributes to Loki stream labels when logs arrive
    # via the OTLP endpoint (/otlp/v1/logs) from the OTel Collector DaemonSet.
    # Short-name attributes (namespace, pod, etc.) are set by the OTel
    # transformprocessor to maintain backward compatibility with Promtail labels
    # and existing Grafana dashboards.
    otlp_config:
      resource_attributes:
        attributes_config:
          - action: index_label
            attributes:
              - namespace
              - pod
              - node_name
              - container
              - app
              - job
      log_attributes:
        - action: index_label
          attributes:
            - level
  schemaConfig:
    configs:
    - from: "2025-01-01"
      index:
        period: 24h
        prefix: loki_index_
      object_store: filesystem
      schema: v13
      store: tsdb
  storage:
    type: filesystem
  # Enable the ruler component so LogQL alert rules can be evaluated.
  # ring.kvstore.store: inmemory — correct for single-binary (no distributed KV).
  # storage.local.directory: /rules — overrides the common.storage.filesystem.rules_directory
  # default (/var/loki/rules on the PVC). The rules ConfigMap is mounted at
  # /rules/fake/ via singleBinary.extraVolumeMounts. With auth_enabled: false,
  # Loki's ruler always uses tenant "fake", so it looks in <directory>/fake/<file>.
  ruler:
    alertmanager_url: http://kps-alertmanager.monitoring.svc:9093
    enable_api: true
    ring:
      kvstore:
        store: inmemory
    storage:
      type: local
      local:
        directory: /rules
lokiCanary:
  enabled: false
minio:
  enabled: false
monitoring:
  lokiCanary:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: true
read:
  replicas: 0
resultsCache:
  enabled: false
singleBinary:
  persistence:
    accessModes:
    - ReadWriteOnce
    enabled: true
    size: 30Gi
    storageClass: longhorn
  replicas: 1
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  # Mount the loki-rules ConfigMap at /rules/fake/ so the ruler can find rule
  # files without requiring the sidecar's FOLDER_ANNOTATION env var.
  # The sc-rules-volume (emptyDir) is mounted at /rules by the chart; this
  # ConfigMap mount creates /rules/fake/ as a subdirectory within it.
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /rules/fake
      readOnly: true
test:
  enabled: false
write:
  replicas: 0
