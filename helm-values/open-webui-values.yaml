# Open WebUI values — AI Gateway phase.
# Routes through LiteLLM proxy (OpenAI-compatible) instead of direct Ollama.
# Backed by PostgreSQL (ai namespace) instead of SQLite.

# Image pinned by digest — tag alone is mutable (same tag can be rebuilt).
# Digest sha256:172e... is the immutable fingerprint of open-webui:0.9.4.
# To upgrade: bump tag + digest together (use: crane digest ghcr.io/open-webui/open-webui:<new-tag>)
image:
  repository: harbor.10.0.0.200.nip.io/library/open-webui
  tag: "8cf7785-amd64"
  pullPolicy: IfNotPresent

ollama:
  enabled: false

# Disable direct Ollama URLs — LiteLLM is the only backend.
ollamaUrls: []
ollamaUrlsFromExtraEnv: false

podLabels:
  backstage.io/kubernetes-id: open-webui

# LiteLLM AI Gateway endpoint (OpenAI-compatible API).
openaiBaseApiUrl: "http://litellm.ai.svc.cluster.local:4000/v1"

# OPENAI_API_KEY pulled from litellm-credentials Secret (ESO-synced from Vault).
openaiApiKeyExistingSecret: "litellm-credentials"
openaiApiKeyExistingSecretKey: "master-key"

# PostgreSQL database URL constructed via chart's databaseUrl field.
# Full URL with credentials embedded — secret is referenced via extraEnvVars.
databaseUrl: ""

pipelines:
  enabled: false

tika:
  enabled: false

websocket:
  enabled: false

redis-cluster:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 3Gi

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

persistence:
  enabled: true
  size: 5Gi
  storageClass: longhorn
  accessModes: [ReadWriteOnce]

ingress:
  enabled: false

service:
  type: ClusterIP
  port: 80
  containerPort: 8080

extraEnvVars:
  - name: WEBUI_NAME
    value: "minicloud chat"
  - name: DEFAULT_MODELS
    value: "phi4-mini"
  # ── Web Search (real-time internet via SearXNG) ─────────────────────
  - name: ENABLE_WEB_SEARCH
    value: "true"
  - name: WEB_SEARCH_ENGINE
    value: "searxng"
  - name: SEARXNG_QUERY_URL
    value: "http://searxng.searxng.svc.cluster.local:8080/search?q=<query>&format=json&language=auto"
  - name: WEB_SEARCH_RESULT_COUNT
    value: "5"
  - name: WEB_SEARCH_CONCURRENT_REQUESTS
    value: "10"
  # Skip full-page scraping — use SearXNG snippets directly.
  # Many sites (FIFA, BBC, etc.) block scrapers; snippets are sufficient for LLM context.
  - name: BYPASS_WEB_SEARCH_WEB_LOADER
    value: "true"
  - name: ENABLE_API_KEY
    value: "true"
  - name: USER_PERMISSIONS_WORKSPACE_MODELS_ACCESS
    value: "true"
  # ── Memory (persistent cross-conversation context) ───────────────────
  # Memories extracted from conversations are stored in PostgreSQL and
  # injected into future sessions automatically. Declared explicitly so
  # upgrades cannot silently change the default.
  - name: ENABLE_MEMORY_FEATURE
    value: "true"
  - name: USER_PERMISSIONS_MEMORY_ENABLED
    value: "true"
  - name: WEBUI_URL
    value: "https://chat.devandre.sbs"
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
    value: "true"
  - name: OAUTH_PROVIDER_NAME
    value: "Authentik"
  - name: OPENID_PROVIDER_URL
    value: "https://auth.devandre.sbs/application/o/open-webui/.well-known/openid-configuration"
  - name: OAUTH_SCOPES
    value: "openid email profile groups"
  - name: ENABLE_OAUTH_ROLE_MANAGEMENT
    value: "true"
  - name: OAUTH_ROLES_CLAIM
    value: "groups"
  - name: OAUTH_ALLOWED_ROLES
    value: "authentik Admins,Users"
  - name: OAUTH_ADMIN_ROLES
    value: "authentik Admins"
  # DATABASE_URL via env var composition: PG_PASSWORD from ESO secret,
  # rest of URL is static. Kubernetes substitutes $(PG_PASSWORD) at pod start.
  - name: PG_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ai-postgresql-secret
        key: password
  - name: DATABASE_URL
    value: "postgresql://aiplatform:$(PG_PASSWORD)@postgresql-ai.ai.svc.cluster.local:5432/openwebui"

  # ── RAG / Vector Search (pgvector) ──────────────────────────────────────
  # Vector store: pgvector on the existing postgresql-ai instance (ragdb database).
  - name: VECTOR_DB
    value: "pgvector"
  - name: PGVECTOR_DB_URL
    value: "postgresql://aiplatform:$(PG_PASSWORD)@postgresql-ai.ai.svc.cluster.local:5432/ragdb"
  # Embedding: text-embedding-3-small via LiteLLM AI gateway (1536-dim, OpenAI cloud).
  # Replaces bge-m3 on Ollama CPU — 359 chunks embed in ~3s vs 14 min.
  # Query embeddings also go through LiteLLM so Langfuse traces the full RAG pipeline.
  - name: RAG_EMBEDDING_ENGINE
    value: "openai"
  - name: RAG_EMBEDDING_MODEL
    value: "text-embedding-3-small"
  - name: RAG_OPENAI_API_BASE_URL
    value: "http://litellm.ai.svc.cluster.local:4000"
  - name: RAG_OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: litellm-credentials
        key: master-key
  - name: CHUNK_SIZE
    value: "500"
  - name: CHUNK_OVERLAP
    value: "100"
  - name: RAG_TOP_K
    value: "10"
  - name: ENABLE_RAG_HYBRID_SEARCH
    value: "true"
  # Hybrid: HNSW vector search (pgvector) + Python BM25Retriever (rank_bm25), merged via RRF.
  # 0.5 = equal weight; raise toward 1.0 for exact-term queries, lower for semantic questions.
  - name: RAG_HYBRID_BM25_WEIGHT
    value: "0.5"
  # ── Document extraction (Docling OCR) ───────────────────────────────
  # Docling converts uploaded PDFs/Word docs to markdown before RAG chunking.
  # CPU-only service in the ai namespace; handles scanned documents via OCR.
  - name: CONTENT_EXTRACTION_ENGINE
    value: "docling"
  - name: DOCLING_SERVER_URL
    value: "http://markitdown-proxy.ai.svc.cluster.local:8000"
  # ── Re-ranking (cross-encoder) ───────────────────────────────────────
  - name: RAG_RERANKING_ENGINE
    value: "sentence_transformers"
  - name: RAG_RERANKING_MODEL
    value: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  - name: RAG_TOP_K_RERANKER
    value: "3"
  - name: VECTOR_LENGTH
    value: "1536"
  - name: PGVECTOR_INITIALIZE_MAX_VECTOR_LENGTH
    value: "1536"
  - name: PGVECTOR_INDEX_METHOD
    value: "hnsw"
  - name: PGVECTOR_HNSW_M
    value: "16"
  - name: PGVECTOR_HNSW_EF_CONSTRUCTION
    value: "64"
  - name: SSL_CERT_FILE
    value: /ca-bundle.crt

extraEnvFrom:
  - secretRef:
      name: openwebui-oidc
  - secretRef:
      name: openwebui-secret-key
