serverName: matrix.devandre.sbs
publicServerName: matrix.devandre.sbs

signingkey:
  job:
    enabled: false  # key generated on first install — disable to avoid repeated job OutOfSync
    generateImage:
      repository: ghcr.io/element-hq/synapse
      tag: v1.127.1
    publishImage:
      repository: docker.io/bitnami/kubectl
      tag: latest

config:
  logLevel: WARNING

extraConfig:
  enable_registration: false
  enable_registration_without_verification: false
  suppress_key_server_warning: true
  # registration_shared_secret and macaroon_secret_key are injected via conf.d/secrets.yaml
  # (chart handles registration_shared_secret) and conf.d/oidc.yaml (extraCommands below).
  # oidc_providers are also injected via conf.d/oidc.yaml — Synapse does NOT perform
  # ${VAR} shell-style substitution in homeserver.yaml; only Jinja2 templates are supported.

postgresql:
  enabled: false

externalPostgresql:
  host: postgresql-ai.ai.svc.cluster.local
  port: 5432
  username: synapse
  existingSecret: synapse-secrets
  existingSecretPasswordKey: pg-password
  database: synapse

synapse:
  strategy:
    type: Recreate

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  podSecurityContext:
    fsGroup: 991
    runAsGroup: 991
    runAsUser: 991
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    runAsNonRoot: true

  # extraCommands run in the same sh -c as exec python (before it), so exports are inherited.
  # They write conf.d/oidc.yaml because Synapse does NOT do ${VAR} substitution in YAML —
  # conf.d/ is loaded after homeserver.yaml and overrides the oidc_providers list.
  extraCommands:
    - "cp /etc/ssl/certs/ca-certificates.crt /tmp/ca-bundle.crt"
    - "cat /etc/minicloud-ca/ca.crt >> /tmp/ca-bundle.crt"
    - "export SSL_CERT_FILE=/tmp/ca-bundle.crt"
    - >-
      python3 -c "
      import os, yaml;
      yaml.safe_dump(
        {
          'macaroon_secret_key': os.environ['SYNAPSE_MACAROON_KEY'],
          'oidc_providers': [{
            'idp_id': 'authentik',
            'idp_name': 'Authentik SSO',
            'discover': False,
            'issuer': 'https://auth.devandre.sbs/',
            'client_auth_method': 'client_secret_post',
            'client_id': os.environ['SYNAPSE_OIDC_CLIENT_ID'],
            'client_secret': os.environ['SYNAPSE_OIDC_CLIENT_SECRET'],
            'authorization_endpoint': 'https://auth.devandre.sbs/application/o/authorize/',
            'token_endpoint': 'https://auth.devandre.sbs/application/o/token/',
            'userinfo_endpoint': 'https://auth.devandre.sbs/application/o/userinfo/',
            'jwks_uri': 'https://auth.devandre.sbs/application/o/matrix-synapse/jwks/',
            'scopes': ['openid', 'profile', 'email'],
            'user_profile_method': 'userinfo_endpoint',
            'allow_existing_users': True,
            'user_mapping_provider': {'config': {
              'localpart_template': '{{ user.preferred_username }}',
              'display_name_template': '{{ user.name }}',
              'email_template': '{{ user.email }}'
            }}
          }]
        },
        open('/synapse/config/conf.d/oidc.yaml', 'w')
      )
      "

  extraVolumes:
    - name: minicloud-ca
      configMap:
        name: minicloud-ca-cert

  extraVolumeMounts:
    - name: minicloud-ca
      mountPath: /etc/minicloud-ca

  extraEnv:
    - name: SYNAPSE_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: synapse-secrets
          key: oidc-client-id
    - name: SYNAPSE_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: synapse-secrets
          key: oidc-client-secret
    - name: SYNAPSE_REGISTRATION_SECRET
      valueFrom:
        secretKeyRef:
          name: synapse-secrets
          key: registration-shared-secret
    - name: SYNAPSE_MACAROON_KEY
      valueFrom:
        secretKeyRef:
          name: synapse-secrets
          key: macaroon-secret-key

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 10Gi

ingress:
  enabled: true
  annotations:
    nginx.org/redirect-to-https: "true"
    cert-manager.io/cluster-issuer: minicloud-ca
    cert-manager.io/duration: "2160h"
    cert-manager.io/renew-before: "720h"
    nginx.org/proxy-body-size: "50m"
  csHosts:
    - matrix.devandre.sbs
    - matrix.10.0.0.200.nip.io
  tls:
    - secretName: matrix-tls
      hosts:
        - matrix.devandre.sbs
        - matrix.10.0.0.200.nip.io

workers:
  default:
    replicaCount: 0

redis:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

coturn:
  enabled: false
