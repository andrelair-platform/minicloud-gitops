# VPA objects
# updateMode: "Off"  = recommendation only, no restarts
# updateMode: "Auto" = VPA adjusts requests and evicts pods to apply
#
# Safe for Auto: stateless Deployments with 7+ days of data.
# Keep Off:  StatefulSets with RWO PVCs (ClickHouse), CRD-managed StatefulSets (Prometheus).
---
# langfuse ClickHouse — StatefulSet + RWO PVC → keep Off (forced eviction risk)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: langfuse-clickhouse
  namespace: langfuse
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: langfuse-clickhouse-shard0
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: clickhouse
        minAllowed:
          cpu: 200m
          memory: 512Mi
        maxAllowed:
          cpu: "2"
          memory: 4Gi
---
# Langfuse web — Deployment, Auto enabled 2026-07-15 (8h of data, 8 restarts observed)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: langfuse-web
  namespace: langfuse
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: langfuse-web
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: langfuse-web
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: "1"
          memory: 2Gi
---
# Prometheus — CRD-managed StatefulSet (operator controls pod lifecycle) → keep Off
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: prometheus
  namespace: monitoring
spec:
  targetRef:
    apiVersion: monitoring.coreos.com/v1
    kind: Prometheus
    name: kps-prometheus
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: prometheus
        minAllowed:
          cpu: 200m
          memory: 512Mi
        maxAllowed:
          cpu: "2"
          memory: 6Gi
---
# Backstage — Deployment, Auto enabled 2026-07-15 (recommendation: 15m/380Mi ≈ current)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: backstage
  namespace: backstage
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backstage
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: backstage
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: "1"
          memory: 2Gi
---
# LiteLLM — AI gateway, memory scales with model cache + concurrent requests
# Auto enabled 2026-07-15 (recommendation: 100m/1312Mi, well above minAllowed)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: litellm
  namespace: ai
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: litellm
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: litellm
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: "2"
          memory: 3Gi
