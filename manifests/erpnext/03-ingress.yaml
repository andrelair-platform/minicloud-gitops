apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erpnext
  namespace: erp
  annotations:
    nginx.org/redirect-to-https: "true"
    nginx.org/proxy-read-timeout: "300"
    nginx.org/proxy-connect-timeout: "60"
    nginx.org/client-max-body-size: "50m"
    # ERPNext long-polling websocket (socket.io)
    nginx.org/websocket-services: "erpnext-nginx"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - erp.devandre.sbs
      secretName: erp-tls
  rules:
    - host: erp.devandre.sbs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: erpnext-nginx
                port:
                  number: 8080
