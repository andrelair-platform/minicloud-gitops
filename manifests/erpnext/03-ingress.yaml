apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erpnext
  namespace: erp
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # ERPNext long-polling websocket (socket.io)
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - erp.devandre.sbs
      secretName: erp-tls
  rules:
    - host: erp.devandre.sbs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: erpnext
                port:
                  number: 8080
