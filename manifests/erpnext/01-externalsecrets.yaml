apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: erpnext-admin-secret
  namespace: erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: erpnext-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: ERPNEXT_ADMIN_PASSWORD
      remoteRef:
        key: secret/platform/erpnext
        property: ERPNEXT_ADMIN_PASSWORD
---
# The ERPNext Helm chart creates a secret named <release-name> (erpnext) with
# key mariadb-root-password — pre-create it via ESO so the password never
# appears in values.yaml. ArgoCD ignoreDifferences on this Secret prevents
# the Helm-rendered stringData from overwriting what ESO owns.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: erpnext-mariadb-root
  namespace: erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: erpnext
    creationPolicy: Owner
  data:
    - secretKey: mariadb-root-password
      remoteRef:
        key: secret/platform/erpnext
        property: ERPNEXT_DB_ROOT_PASSWORD
