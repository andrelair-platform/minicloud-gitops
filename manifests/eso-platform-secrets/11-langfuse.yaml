---
# Langfuse secrets — deployed to the langfuse namespace.
# Vault KV path: platform/langfuse
# Keys: db-password, nextauth-secret, encryption-key, clickhouse-password,
#        minio-access-key, minio-secret-key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langfuse-secrets
  namespace: langfuse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: langfuse-secrets
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: platform/langfuse
        property: db-password
    - secretKey: nextauth-secret
      remoteRef:
        key: platform/langfuse
        property: nextauth-secret
    - secretKey: encryption-key
      remoteRef:
        key: platform/langfuse
        property: encryption-key
    - secretKey: clickhouse-password
      remoteRef:
        key: platform/langfuse
        property: clickhouse-password
    - secretKey: s3-access-key-id
      remoteRef:
        key: platform/langfuse
        property: minio-access-key
    - secretKey: s3-secret-access-key
      remoteRef:
        key: platform/langfuse
        property: minio-secret-key
    - secretKey: salt
      remoteRef:
        key: platform/langfuse
        property: salt
---
# langfuse-oidc-env — mapped as env vars via additionalEnvFrom.
# Key names match NextAuth env var names directly.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langfuse-oidc-env
  namespace: langfuse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: langfuse-oidc-env
    creationPolicy: Owner
  data:
    - secretKey: AUTH_CUSTOM_CLIENT_ID
      remoteRef:
        key: platform/langfuse
        property: oidc-client-id
    - secretKey: AUTH_CUSTOM_CLIENT_SECRET
      remoteRef:
        key: platform/langfuse
        property: oidc-client-secret
    - secretKey: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
      remoteRef:
        key: platform/langfuse
        property: project-public-key
    - secretKey: LANGFUSE_INIT_PROJECT_SECRET_KEY
      remoteRef:
        key: platform/langfuse
        property: project-secret-key
