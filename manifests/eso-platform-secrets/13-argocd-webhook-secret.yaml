---
# Merges webhook.github.secret into argocd-secret so ArgoCD validates
# GitHub push webhook HMAC signatures and refreshes immediately on push.
# Vault path: secret/platform/argocd-webhook (key: webhook-secret)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-webhook-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: webhook.github.secret
      remoteRef:
        key: secret/platform/argocd-webhook
        property: webhook-secret
