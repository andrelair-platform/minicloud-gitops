apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-eval-credentials
  namespace: ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rag-eval-credentials
    creationPolicy: Owner
  data:
    - secretKey: litellm-api-key
      remoteRef:
        key: platform/rag-eval-credentials
        property: litellm-api-key
    - secretKey: openwebui-api-key
      remoteRef:
        key: platform/rag-eval-credentials
        property: openwebui-api-key
    - secretKey: langfuse-public-key
      remoteRef:
        key: platform/rag-eval-credentials
        property: langfuse-public-key
    - secretKey: langfuse-secret-key
      remoteRef:
        key: platform/rag-eval-credentials
        property: langfuse-secret-key
    - secretKey: pg-password
      remoteRef:
        key: platform/ai-postgresql
        property: password
