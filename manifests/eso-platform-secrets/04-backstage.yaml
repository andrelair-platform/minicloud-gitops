apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-phase24-secret
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: backstage-phase24-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: platform/backstage
