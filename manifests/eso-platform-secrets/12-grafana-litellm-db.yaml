---
# LiteLLM PostgreSQL password injected into Grafana as an env var
# so the litellm-postgres datasource can authenticate without hardcoding the password.
# Vault KV path: platform/ai-postgresql — same source as ai-postgresql-secret in ai namespace.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-litellm-db
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-litellm-db
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: platform/ai-postgresql
        property: password
