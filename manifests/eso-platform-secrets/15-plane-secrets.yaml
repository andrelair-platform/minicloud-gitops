---
# App env secret — SECRET_KEY, connection URLs (replaces plane-ce-app-secrets)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: plane-app-secrets
  namespace: productivity
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: plane-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: platform/plane
        property: SECRET_KEY
    - secretKey: LIVE_SERVER_SECRET_KEY
      remoteRef:
        key: platform/plane
        property: LIVE_SERVER_SECRET_KEY
    - secretKey: REDIS_URL
      remoteRef:
        key: platform/plane
        property: REDIS_URL
    - secretKey: DATABASE_URL
      remoteRef:
        key: platform/plane
        property: DATABASE_URL
    - secretKey: AMQP_URL
      remoteRef:
        key: platform/plane
        property: AMQP_URL
