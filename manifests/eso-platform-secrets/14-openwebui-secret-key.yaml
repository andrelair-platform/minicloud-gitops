---
# Stable WEBUI_SECRET_KEY so JWTs survive pod restarts.
# Without this, every restart regenerates the key and invalidates all existing tokens.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openwebui-secret-key
  namespace: ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openwebui-secret-key
    creationPolicy: Owner
  data:
    - secretKey: WEBUI_SECRET_KEY
      remoteRef:
        key: secret/platform/openwebui
        property: webui-secret-key
