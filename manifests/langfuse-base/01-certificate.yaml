---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: langfuse-tls
  namespace: langfuse
spec:
  dnsNames:
    - langfuse.10.0.0.200.nip.io
    - langfuse.devandre.sbs
  duration: 2160h
  renewBefore: 720h
  issuerRef:
    name: minicloud-ca
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: langfuse-tls
