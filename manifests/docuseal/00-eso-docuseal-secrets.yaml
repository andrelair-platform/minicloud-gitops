apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: docuseal-secret
  namespace: sign
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: docuseal-secret
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: secret/platform/docuseal
        property: secret-key-base
