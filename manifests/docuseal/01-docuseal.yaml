---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docuseal-data
  namespace: sign
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuseal
  namespace: sign
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: docuseal
  template:
    metadata:
      labels:
        app: docuseal
        backstage.io/kubernetes-id: docuseal
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - fast-heron
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: docuseal
          image: docker.io/docuseal/docuseal:1.8.3
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: docuseal-secret
                  key: SECRET_KEY_BASE
            - name: FORCE_SSL
              value: "false"
            - name: HOST
              value: "sign.devandre.sbs"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docuseal-data
---
apiVersion: v1
kind: Service
metadata:
  name: docuseal
  namespace: sign
spec:
  selector:
    app: docuseal
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docuseal
  namespace: sign
  annotations:
    nginx.org/redirect-to-https: "true"
    cert-manager.io/cluster-issuer: minicloud-ca
    nginx.org/proxy-read-timeout: "120"
    nginx.org/client-max-body-size: "100m"
    # Authentik forward-auth
    nginx.org/server-snippets: |
      location /outpost.goauthentik.io {
          proxy_pass              http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io;
          proxy_set_header        Host $host;
          proxy_set_header        X-Original-URL $scheme://$http_host$request_uri;
          add_header              Set-Cookie $auth_cookie;
          auth_request_set        $auth_cookie $upstream_http_set_cookie;
          proxy_pass_request_body off;
          proxy_set_header        Content-Length "";
      }
      location @goauthentik_proxy_signin {
          internal;
          add_header Set-Cookie $auth_cookie;
          return 302 /outpost.goauthentik.io/start?rd=$request_uri;
      }
    nginx.org/location-snippets: |
      auth_request     /outpost.goauthentik.io/auth/nginx;
      error_page       401 = @goauthentik_proxy_signin;
      auth_request_set $auth_cookie $upstream_http_set_cookie;
      add_header       Set-Cookie $auth_cookie;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sign.devandre.sbs
        - sign.10.0.0.200.nip.io
      secretName: docuseal-tls
  rules:
    - host: sign.devandre.sbs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docuseal
                port:
                  number: 3000
    - host: sign.10.0.0.200.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docuseal
                port:
                  number: 3000
