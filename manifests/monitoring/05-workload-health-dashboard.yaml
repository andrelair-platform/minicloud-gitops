apiVersion: v1
kind: ConfigMap
metadata:
  name: minicloud-workload-health-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  workload-health.json: |
    {
      "uid": "minicloud-workload-health",
      "title": "Workload Health Overview",
      "description": "Pod states, restarts, CrashLoopBackOff, OOMKill, and deployment availability across all namespaces.",
      "tags": ["minicloud", "kubernetes", "workload"],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Running Pods",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "green", "mode": "fixed"}, "unit": "short", "noValue": "0"}},
          "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)", "instant": true, "legendFormat": "__auto"}]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pending Pods",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "noValue": "0",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Pending\"} == 1) or vector(0)", "instant": true, "legendFormat": "__auto"}]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Failed Pods",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "noValue": "0",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Failed\"} == 1) or vector(0)", "instant": true, "legendFormat": "__auto"}]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "CrashLoopBackOff",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "noValue": "0",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{"expr": "count(kube_pod_container_status_waiting_reason{reason=\"CrashLoopBackOff\"} == 1) or vector(0)", "instant": true, "legendFormat": "__auto"}]
        },
        {
          "id": 5,
          "type": "table",
          "title": "CrashLoopBackOff Containers",
          "description": "Containers currently in CrashLoopBackOff. Empty = healthy.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "options": {},
          "fieldConfig": {
            "defaults": {"custom": {"filterable": true}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "Value"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "__name__"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "reason"}, "properties": [{"id": "custom.hidden", "value": true}]}
            ]
          },
          "targets": [{"expr": "kube_pod_container_status_waiting_reason{reason=\"CrashLoopBackOff\"} == 1", "instant": true, "format": "table", "legendFormat": "__auto"}],
          "transformations": [
            {"id": "filterFieldsByName", "options": {"include": {"names": ["namespace", "pod", "container"]}}}
          ]
        },
        {
          "id": 6,
          "type": "table",
          "title": "Top Restarting Pods (last 1h)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "options": {"sortBy": [{"displayName": "Restarts", "desc": true}]},
          "fieldConfig": {
            "defaults": {"custom": {"filterable": true}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "Value"}, "properties": [{"id": "displayName", "value": "Restarts"}, {"id": "decimals", "value": 0}]}
            ]
          },
          "targets": [{"expr": "topk(10, sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[1h])) > 0)", "instant": true, "format": "table", "legendFormat": "__auto"}],
          "transformations": [
            {"id": "filterFieldsByName", "options": {"include": {"names": ["namespace", "pod", "Value"]}}}
          ]
        },
        {
          "id": 7,
          "type": "table",
          "title": "Deployment Health — Missing Replicas",
          "description": "Deployments where available replicas < desired. Empty = all healthy.",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "options": {"sortBy": [{"displayName": "Missing", "desc": true}]},
          "fieldConfig": {
            "defaults": {"custom": {"filterable": true}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "Value"}, "properties": [
                {"id": "displayName", "value": "Missing"},
                {"id": "decimals", "value": 0},
                {"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}
              ]}
            ]
          },
          "targets": [{"expr": "kube_deployment_spec_replicas - kube_deployment_status_replicas_available > 0", "instant": true, "format": "table", "legendFormat": "__auto"}],
          "transformations": [
            {"id": "filterFieldsByName", "options": {"include": {"names": ["namespace", "deployment", "Value"]}}}
          ]
        },
        {
          "id": 8,
          "type": "table",
          "title": "OOMKilled Containers",
          "description": "Containers whose last termination reason was OOMKill. Empty = no recent OOMKills.",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "options": {},
          "fieldConfig": {
            "defaults": {"custom": {"filterable": true}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Time"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "Value"}, "properties": [{"id": "custom.hidden", "value": true}]},
              {"matcher": {"id": "byName", "options": "reason"}, "properties": [{"id": "custom.hidden", "value": true}]}
            ]
          },
          "targets": [{"expr": "kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\"} == 1", "instant": true, "format": "table", "legendFormat": "__auto"}],
          "transformations": [
            {"id": "filterFieldsByName", "options": {"include": {"names": ["namespace", "pod", "container"]}}}
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Container Restart Rate — by Namespace (5m rate)",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 20},
          "fieldConfig": {
            "defaults": {"unit": "short", "custom": {"lineWidth": 2}},
            "overrides": []
          },
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"]}},
          "targets": [{"expr": "sum by (namespace) (rate(kube_pod_container_status_restarts_total[5m])) > 0", "legendFormat": "{{namespace}}"}]
        }
      ]
    }
