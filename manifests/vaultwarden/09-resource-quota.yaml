---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vaultwarden-quota
  namespace: vaultwarden
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: 256Mi
    limits.cpu: "2"
    limits.memory: 1Gi
    persistentvolumeclaims: "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: vaultwarden-limits
  namespace: vaultwarden
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 128Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
