---
# Syncs Vaultwarden credentials from Vault KV secret/platform/vaultwarden
# Required Vault keys: database-url, admin-token, oidc-client-secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-secrets
  namespace: vaultwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vaultwarden-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/platform/vaultwarden
        property: database-url
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: secret/platform/vaultwarden
        property: admin-token
    - secretKey: SSO_CLIENT_SECRET
      remoteRef:
        key: secret/platform/vaultwarden
        property: oidc-client-secret
