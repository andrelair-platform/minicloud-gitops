---
# Actual steady-state: 1Gi requests / 3Gi limits across 8 pods
# Bumped requests.memory 1Gi→2Gi to allow rolling updates (old + new pod overlap)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: harbor-quota
  namespace: harbor
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "4"
    requests.memory: 2Gi
    limits.memory: 6Gi
    count/pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: harbor-limits
  namespace: harbor
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 10m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
