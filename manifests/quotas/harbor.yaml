---
# Actual peak: ~13m CPU / 233Mi memory (7 pods: core, db, jobservice, portal, redis, registry, trivy)
# Quota allows for image builds and vulnerability scanning spikes
apiVersion: v1
kind: ResourceQuota
metadata:
  name: harbor-quota
  namespace: harbor
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "4"
    requests.memory: 1Gi
    limits.memory: 3Gi
    count/pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: harbor-limits
  namespace: harbor
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 10m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
