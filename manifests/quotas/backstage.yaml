---
# Actual peak: ~9m CPU / 249Mi memory (backstage: 1m/217Mi, postgresql: 8m/32Mi)
# Backstage is Node.js — memory footprint grows with plugins and catalog size
apiVersion: v1
kind: ResourceQuota
metadata:
  name: backstage-quota
  namespace: backstage
spec:
  hard:
    requests.cpu: "1"
    limits.cpu: "2"
    requests.memory: 1Gi
    limits.memory: 2Gi
    count/pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: backstage-limits
  namespace: backstage
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 2Gi
