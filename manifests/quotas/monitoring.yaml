---
# Actual steady-state: ~3.5/4 CPU limits (10 pods). Bumped limits.cpu 4→6 for rolling updates headroom.
# Prometheus is memory-heavy; quota set at ~3-4x to allow retention growth
# 12Gi: ArgoCD-managed kps uses 7744Mi + admission hook needs 512Mi = 8256Mi; bumped for headroom
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "6"
    requests.memory: 6Gi
    limits.memory: 12Gi
    count/pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 512Mi
      defaultRequest:
        cpu: 10m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 4Gi
