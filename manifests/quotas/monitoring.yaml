---
# Actual peak: ~195m CPU / 1700Mi memory (Prometheus 184m/1280Mi, Grafana 7m/413Mi)
# Prometheus is memory-heavy; quota set at ~3-4x to allow retention growth
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "4"
    requests.memory: 4Gi
    limits.memory: 8Gi
    count/pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 512Mi
      defaultRequest:
        cpu: 10m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 4Gi
