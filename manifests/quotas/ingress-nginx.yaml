---
# Peak during controller swap: old pod (512Mi) + 2 admission jobs (128Mi each) = 768Mi
# Steady state: community ingress-nginx controller (512Mi) + ServiceMonitor scrape pod
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ingress-nginx-quota
  namespace: ingress-nginx
spec:
  hard:
    requests.cpu: 500m
    limits.cpu: "2"
    requests.memory: 512Mi
    limits.memory: 1Gi
    count/pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ingress-nginx-limits
  namespace: ingress-nginx
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 128Mi
      defaultRequest:
        cpu: 10m
        memory: 64Mi
      max:
        cpu: "1"
        memory: 512Mi
