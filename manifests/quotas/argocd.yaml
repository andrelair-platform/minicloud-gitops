---
# Actual peak: ~21m CPU / 515Mi memory (5 pods)
# 9Gi: controller bumped 1Gi→2Gi + repo-server 2500Mi → rolling update needs 7.8Gi peak
# Breakdown: controller 2Gi + repo-server×2 5Gi + server 512Mi + appset 256Mi + redis 128Mi
apiVersion: v1
kind: ResourceQuota
metadata:
  name: argocd-quota
  namespace: argocd
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "6"
    requests.memory: 4Gi
    limits.memory: 9Gi
    count/pods: "20"
---
# LimitRange injects defaults so pods without explicit resource specs count against the quota
apiVersion: v1
kind: LimitRange
metadata:
  name: argocd-limits
  namespace: argocd
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 10m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 3Gi
