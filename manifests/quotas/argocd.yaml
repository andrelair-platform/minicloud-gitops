---
# Actual peak: ~21m CPU / 515Mi memory (5 pods)
# 5Gi: repo-server bumped to 1500Mi (was OOMKilled at 512Mi with 54 Helm apps
# concurrent chart processing); controller 1Gi + others ~1Gi → 3.5Gi total
apiVersion: v1
kind: ResourceQuota
metadata:
  name: argocd-quota
  namespace: argocd
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "6"
    requests.memory: 2Gi
    limits.memory: 5Gi
    count/pods: "20"
---
# LimitRange injects defaults so pods without explicit resource specs count against the quota
apiVersion: v1
kind: LimitRange
metadata:
  name: argocd-limits
  namespace: argocd
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 10m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
