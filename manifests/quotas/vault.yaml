---
# Actual peak: ~5m CPU / 65Mi memory (vault-0: 1m/54Mi, agent-injector: 4m/11Mi)
# Vault is intentionally lean; quota still allows headroom for unsealing and raft sync
apiVersion: v1
kind: ResourceQuota
metadata:
  name: vault-quota
  namespace: vault
spec:
  hard:
    requests.cpu: "1"
    limits.cpu: "2"
    requests.memory: 512Mi
    limits.memory: 1Gi
    count/pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: vault-limits
  namespace: vault
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 512Mi
