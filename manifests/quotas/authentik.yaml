---
# Actual peak: ~197m CPU / 889Mi memory (server 49m/437Mi, worker 78m/271Mi, postgres 70m/181Mi)
# Authentik is memory-heavy; server holds OIDC session state in memory
apiVersion: v1
kind: ResourceQuota
metadata:
  name: authentik-quota
  namespace: authentik
spec:
  hard:
    requests.cpu: "1"
    limits.cpu: "3"
    requests.memory: 2Gi
    limits.memory: 4Gi
    count/pods: "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: authentik-limits
  namespace: authentik
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 512Mi
      defaultRequest:
        cpu: 10m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
