apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: minicloud-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Minicloud platform — source-restricted to andrelair-platform repos"

  sourceRepos:
    - https://github.com/andrelair-platform/minicloud-gitops
    - https://github.com/andrelair-platform/minicloud-gitops.git
    # Third-party Helm chart repos
    - https://argoproj.github.io/argo-helm
    - https://charts.goauthentik.io
    - https://backstage.github.io/charts
    - https://charts.bitnami.com/bitnami
    - https://charts.chaos-mesh.org
    - https://charts.external-secrets.io
    - https://charts.fairwinds.com/stable
    - https://charts.jetstack.io
    - https://falcosecurity.github.io/charts
    - https://grafana.github.io/helm-charts
    - https://helm.goharbor.io
    - https://helm.nginx.com/stable
    - https://helm.openwebui.com
    - https://helm.releases.hashicorp.com
    - https://kedacore.github.io/charts
    - https://kubereboot.github.io/charts
    - https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
    - https://langfuse.github.io/langfuse-k8s
    - https://nats-io.github.io/k8s/helm/charts/
    - https://nextcloud.github.io/helm/
    - https://open-policy-agent.github.io/gatekeeper/charts
    - https://otwld.github.io/ollama-helm/
    - https://helm.plane.so/
    - https://prometheus-community.github.io/helm-charts
    - https://stefanprodan.github.io/podinfo
    - https://stakater.github.io/stakater-charts
    - https://vmware-tanzu.github.io/helm-charts

  destinations:
    # Explicit namespace allowlist — kube-system, kube-public, kube-node-lease excluded
    - namespace: ai
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: authentik
      server: https://kubernetes.default.svc
    - namespace: backstage
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: chaos-mesh
      server: https://kubernetes.default.svc
    - namespace: collab-dev
      server: https://kubernetes.default.svc
    - namespace: collab-prod
      server: https://kubernetes.default.svc
    - namespace: collab-staging
      server: https://kubernetes.default.svc
    - namespace: default
      server: https://kubernetes.default.svc
    - namespace: event-demo
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: falco
      server: https://kubernetes.default.svc
    - namespace: gatekeeper-system
      server: https://kubernetes.default.svc
    - namespace: gitops-demo
      server: https://kubernetes.default.svc
    - namespace: platform-demo-dev
      server: https://kubernetes.default.svc
    - namespace: platform-demo-staging
      server: https://kubernetes.default.svc
    - namespace: harbor
      server: https://kubernetes.default.svc
    - namespace: homer
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: insurance-dev
      server: https://kubernetes.default.svc
    - namespace: insurance-prod
      server: https://kubernetes.default.svc
    - namespace: insurance-staging
      server: https://kubernetes.default.svc
    - namespace: keda
      server: https://kubernetes.default.svc
    - namespace: kured
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: ktayl-web
      server: https://kubernetes.default.svc
    - namespace: langfuse
      server: https://kubernetes.default.svc
    - namespace: messaging
      server: https://kubernetes.default.svc
    - namespace: minicloud-plane-dev
      server: https://kubernetes.default.svc
    - namespace: minicloud-plane-staging
      server: https://kubernetes.default.svc
    - namespace: minicloud-plane-prod
      server: https://kubernetes.default.svc
    - namespace: metallb-system
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: nextcloud
      server: https://kubernetes.default.svc
    - namespace: nfs-provisioner
      server: https://kubernetes.default.svc
    - namespace: observability
      server: https://kubernetes.default.svc
    - namespace: podinfo
      server: https://kubernetes.default.svc
    - namespace: productivity
      server: https://kubernetes.default.svc
    - namespace: polaris
      server: https://kubernetes.default.svc
    - namespace: searxng
      server: https://kubernetes.default.svc
    - namespace: vault
      server: https://kubernetes.default.svc
    - namespace: vaultwarden
      server: https://kubernetes.default.svc
    - namespace: velero
      server: https://kubernetes.default.svc
    - namespace: argo-rollouts
      server: https://kubernetes.default.svc
    - namespace: vpa-system
      server: https://kubernetes.default.svc
    - namespace: system-upgrade
      server: https://kubernetes.default.svc
    - namespace: reloader
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "admissionregistration.k8s.io"
      kind: ValidatingWebhookConfiguration
    - group: "admissionregistration.k8s.io"
      kind: MutatingWebhookConfiguration
    - group: "external-secrets.io"
      kind: ClusterSecretStore
    - group: "storage.k8s.io"
      kind: StorageClass
    - group: "networking.k8s.io"
      kind: IngressClass
    - group: "apiregistration.k8s.io"
      kind: APIService
    - group: "templates.gatekeeper.sh"
      kind: ConstraintTemplate
    - group: "constraints.gatekeeper.sh"
      kind: "*"

  # Explicit group allowlist — group: "*" wildcard removed
  namespaceResourceWhitelist:
    # Core Kubernetes
    - group: ""
      kind: "*"
    - group: "apps"
      kind: "*"
    - group: "batch"
      kind: "*"
    - group: "networking.k8s.io"
      kind: "*"
    - group: "autoscaling"
      kind: "*"
    - group: "policy"
      kind: "*"
    - group: "rbac.authorization.k8s.io"
      kind: "*"
    # cert-manager
    - group: "cert-manager.io"
      kind: "*"
    - group: "acme.cert-manager.io"
      kind: "*"
    # External Secrets Operator
    - group: "external-secrets.io"
      kind: "*"
    # ArgoCD
    - group: "argoproj.io"
      kind: "*"
    # Prometheus / Grafana
    - group: "monitoring.coreos.com"
      kind: "*"
    # KEDA
    - group: "keda.sh"
      kind: "*"
    # Chaos Mesh
    - group: "chaos-mesh.org"
      kind: "*"
    # Gatekeeper config (namespace-scoped)
    - group: "config.gatekeeper.sh"
      kind: "*"
    # NGINX Ingress (F5)
    - group: "appprotect.f5.com"
      kind: "*"
    - group: "appprotectdos.f5.com"
      kind: "*"
    # Velero backup CRs (namespace-scoped in velero ns)
    - group: "velero.io"
      kind: "*"
    # system-upgrade-controller Plans
    - group: "upgrade.cattle.io"
      kind: "*"
    # VPA objects (VerticalPodAutoscaler)
    - group: "autoscaling.k8s.io"
      kind: "*"
