---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: onlyoffice-configurator
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: onlyoffice-configurator
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: onlyoffice-configurator
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "2"
subjects:
  - kind: ServiceAccount
    name: onlyoffice-configurator
    namespace: nextcloud
roleRef:
  kind: Role
  name: onlyoffice-configurator
  apiGroup: rbac.authorization.k8s.io
