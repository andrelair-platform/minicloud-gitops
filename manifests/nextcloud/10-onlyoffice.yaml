---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: onlyoffice
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: onlyoffice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: onlyoffice
        backstage.io/kubernetes-id: onlyoffice
    spec:
      containers:
        - name: documentserver
          image: harbor.10.0.0.200.nip.io/library/onlyoffice:ac88e2d-amd64
          ports:
            - containerPort: 80
              name: http
          env:
            - name: JWT_ENABLED
              value: "true"
            - name: JWT_HEADER
              value: "AuthorizationJwt"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: onlyoffice-jwt-secret
            # Allow OnlyOffice to reach Nextcloud on private/cluster IPs
            - name: ALLOW_PRIVATE_IP_ADDRESS
              value: "true"
            - name: ALLOW_META_IP_ADDRESS
              value: "true"
          securityContext:
            capabilities:
              drop:
                - NET_RAW
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app.kubernetes.io/name: onlyoffice
  ports:
    - name: http
      port: 80
      targetPort: 80
