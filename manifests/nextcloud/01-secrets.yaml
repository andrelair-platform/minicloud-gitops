---
# Nextcloud admin credentials + DB password + OIDC client secret
# Values injected at deploy time via kubectl — never committed with real values
apiVersion: v1
kind: Secret
metadata:
  name: nextcloud-secrets
  namespace: nextcloud
type: Opaque
stringData:
  nextcloud-admin-username: "REPLACE_ME"
  nextcloud-admin-password: "REPLACE_ME"
  nextcloud-db-password: "REPLACE_ME"
  smtp-password: ""
