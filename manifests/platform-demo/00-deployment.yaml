---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo
  namespace: gitops-demo
  labels:
    app: platform-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-demo
  template:
    metadata:
      labels:
        app: platform-demo
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: platform-demo
                topologyKey: kubernetes.io/hostname
      # Org-level policy on andrelair-platform forbids public ghcr packages,
      # so kubelet authenticates with a narrow-scope read:packages PAT
      # stored as a docker-registry Secret. The Secret is created out of
      # band (kubectl create secret docker-registry) and never lives in git.
      # Phase 15 will replace this with External Secrets Operator + Vault.
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: platform-demo
          # Bootstrap with a known-good public image so this Application
          # syncs Healthy from the start. The CI workflow in
          # andrelair-platform/platform-demo replaces this line on every
          # push to main with the freshly built ghcr.io/.../<sha> image.
          image: ghcr.io/andrelair-platform/platform-demo:77b10fa
          ports:
            - containerPort: 9898
              name: http
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {cpu: 100m, memory: 64Mi}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
