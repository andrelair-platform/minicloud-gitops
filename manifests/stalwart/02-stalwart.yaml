---
apiVersion: v1
kind: Service
metadata:
  name: stalwart
  namespace: mail
spec:
  selector:
    app: stalwart
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: smtp
      port: 25
      targetPort: 25
    - name: submission
      port: 587
      targetPort: 587
    - name: imap
      port: 143
      targetPort: 143
---
# NodePort for IMAP + SMTP submission — reachable from Tailscale (10.0.0.x:NodePort)
apiVersion: v1
kind: Service
metadata:
  name: stalwart-nodeport
  namespace: mail
spec:
  type: NodePort
  selector:
    app: stalwart
  ports:
    - name: imap
      port: 143
      targetPort: 143
      nodePort: 30143
    - name: submission
      port: 587
      targetPort: 587
      nodePort: 30587
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart
  namespace: mail
spec:
  serviceName: stalwart
  replicas: 1
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
        backstage.io/kubernetes-id: stalwart
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: stalwart
          image: docker.io/stalwartlabs/stalwart:v0.16.13
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 25
              name: smtp
            - containerPort: 587
              name: submission
            - containerPort: 143
              name: imap
          env:
            - name: STALWART_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: STALWART_ADMIN_SECRET
            - name: SMTP_RELAY_HOST
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: SMTP_RELAY_HOST
            - name: SMTP_RELAY_PORT
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: SMTP_RELAY_PORT
            - name: SMTP_RELAY_USER
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: SMTP_RELAY_USER
            - name: SMTP_RELAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: SMTP_RELAY_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /etc/stalwart/config.json
              subPath: config.json
            - name: data
              mountPath: /opt/stalwart-mail/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: stalwart-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 20Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stalwart
  namespace: mail
  annotations:
    nginx.org/redirect-to-https: "true"
    cert-manager.io/cluster-issuer: minicloud-ca
    nginx.org/proxy-read-timeout: "300"
    nginx.org/proxy-connect-timeout: "60"
    nginx.org/client-max-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mail.devandre.sbs
        - mail.10.0.0.200.nip.io
      secretName: stalwart-tls
  rules:
    - host: mail.devandre.sbs
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stalwart
                port:
                  number: 8080
    - host: mail.10.0.0.200.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stalwart
                port:
                  number: 8080
