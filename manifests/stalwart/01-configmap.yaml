apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: mail
data:
  config.json: |
    {
      "server": {
        "hostname": "mail.devandre.sbs",
        "listener": {
          "http": {
            "bind": ["[::]:8080"],
            "protocol": "http",
            "tls": false
          },
          "smtp": {
            "bind": ["[::]:25"],
            "protocol": "smtp"
          },
          "submission": {
            "bind": ["[::]:587"],
            "protocol": "smtp",
            "tls": false
          },
          "imap": {
            "bind": ["[::]:143"],
            "protocol": "imap"
          }
        }
      },
      "store": {
        "rocksdb": {
          "@type": "rocksdb",
          "path": "/opt/stalwart-mail/data"
        },
        "blobs": {
          "@type": "fs",
          "path": "/opt/stalwart-mail/data/blobs"
        }
      },
      "storage": {
        "data": "rocksdb",
        "fts": "rocksdb",
        "blob": "blobs",
        "lookup": "rocksdb",
        "directory": "internal"
      },
      "directory": {
        "internal": {
          "@type": "internal",
          "store": "rocksdb"
        }
      },
      "authentication": {
        "fallback-admin": {
          "user": "admin",
          "secret": "%{env:STALWART_ADMIN_SECRET}%"
        }
      },
      "remote": {
        "smtp-relay": {
          "address": "%{env:SMTP_RELAY_HOST}%",
          "port": 587,
          "tls": "starttls",
          "username": "%{env:SMTP_RELAY_USER}%",
          "secret": "%{env:SMTP_RELAY_PASSWORD}%"
        }
      },
      "tracer": {
        "log": {
          "@type": "log",
          "level": "info",
          "ansi": false
        }
      }
    }
