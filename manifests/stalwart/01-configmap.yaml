apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: mail
data:
  # v0.16+ format: config.json is ONLY the DataStore descriptor.
  # All other settings (hostname, listeners, domains, users, routing)
  # are stored inside the RocksDB database and managed via the WebUI or CLI.
  config.json: |
    {"@type":"RocksDb","path":"/opt/stalwart-mail/data"}
