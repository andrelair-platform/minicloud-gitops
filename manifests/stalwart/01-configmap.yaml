apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: mail
data:
  config.toml: |
    [server]
    hostname = "mail.devandre.sbs"

    # HTTP: webmail + admin UI (behind NGINX ingress → Cloudflare Tunnel)
    [server.listener."http"]
    bind = ["[::]:8080"]
    protocol = "http"
    tls = false

    # SMTP (port 25) — internal cluster use + Tailscale subnet clients
    [server.listener."smtp"]
    bind = ["[::]:25"]
    protocol = "smtp"

    # SMTP Submission (port 587) — authenticated outbound for clients
    [server.listener."submission"]
    bind = ["[::]:587"]
    protocol = "smtp"
    tls = false

    # IMAP (port 143) — mail clients via Tailscale
    [server.listener."imap"]
    bind = ["[::]:143"]
    protocol = "imap"

    # Storage: RocksDB for data/index/FTS, local FS for blobs
    [store."rocksdb"]
    type = "rocksdb"
    path = "/opt/stalwart-mail/data"

    [store."blobs"]
    type = "fs"
    path = "/opt/stalwart-mail/data/blobs"

    [storage]
    data      = "rocksdb"
    fts       = "rocksdb"
    blob      = "blobs"
    lookup    = "rocksdb"
    directory = "internal"

    # Internal user directory (stored in RocksDB)
    [directory."internal"]
    type  = "internal"
    store = "rocksdb"

    # Fallback admin — password from env var injected by ESO secret
    [authentication.fallback-admin]
    user   = "admin"
    secret = "%{env:STALWART_ADMIN_SECRET}%"

    # SMTP relay for outbound internet delivery
    # Configure via admin UI at mail.devandre.sbs/admin after deployment
    # Recommended: Brevo free tier (300 emails/day), port 587, STARTTLS
    [remote."smtp-relay"]
    address  = "%{env:SMTP_RELAY_HOST}%"
    port     = 587
    tls      = "starttls"
    username = "%{env:SMTP_RELAY_USER}%"
    secret   = "%{env:SMTP_RELAY_PASSWORD}%"

    # Logging
    [tracer."log"]
    type  = "log"
    level = "info"
    ansi  = false
