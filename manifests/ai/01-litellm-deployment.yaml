apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: litellm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm
          image: harbor.10.0.0.200.nip.io/library/litellm-custom:1.90.3-prisma-v5
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: master-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: database-url
            - name: LITELLM_LOG
              value: "INFO"
            - name: HOME
              value: /tmp
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: langfuse-secret-key
            - name: LANGFUSE_HOST
              value: "http://langfuse-web.langfuse.svc.cluster.local:3000"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: groq-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: openai-api-key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: gemini-api-key
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: deepseek-api-key
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: mistral-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: anthropic-api-key
            - name: HUGGINGFACE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: hf-token
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: nvidia-api-key
          envFrom:
            - configMapRef:
                name: phi3-financial-prompt
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: prompt-handler
              mountPath: /app/langfuse_prompt_handler.py
              subPath: handler.py
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: prompt-handler
          configMap:
            name: langfuse-prompt-handler
