apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-governance-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ai-governance-dashboard.json: |
    {
      "id": null,
      "uid": "ai-governance-v1",
      "title": "AI Platform — Governance & Operations",
      "tags": ["ai", "governance", "litellm", "langfuse"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {
          "type": "stat",
          "id": 1,
          "title": "Requests — last 1 h",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "fixed", "fixedColor": "blue"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(increase(litellm_proxy_total_requests_metric_total[1h]))",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "type": "stat",
          "id": 2,
          "title": "Error Rate — last 5 m",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "100 * sum(rate(litellm_proxy_failed_requests_metric_total[5m])) / (sum(rate(litellm_proxy_total_requests_metric_total[5m])) > 0)",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "type": "stat",
          "id": 3,
          "title": "P95 Latency — last 5 m",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 2,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 5},
                  {"color": "red", "value": 15}
                ]
              }
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "histogram_quantile(0.95, sum by (le) (rate(litellm_request_total_latency_metric_bucket[5m])))",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "type": "stat",
          "id": 4,
          "title": "Cache Hit Rate — last 5 m",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "noValue": "—",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 0.3},
                  {"color": "green", "value": 0.6}
                ]
              }
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(rate(litellm_cache_hits_metric_total[5m])) / (sum(rate(litellm_cache_hits_metric_total[5m])) + sum(rate(litellm_cache_misses_metric_total[5m])))",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "type": "row",
          "id": 5,
          "title": "Traffic & Throughput",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 4}
        },
        {
          "type": "timeseries",
          "id": 6,
          "title": "Request Rate by Model",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["sum"]}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"lineInterpolation": "smooth", "spanNulls": false, "fillOpacity": 10}
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum by (requested_model) (rate(litellm_proxy_total_requests_metric_total[$__rate_interval]))",
            "legendFormat": "{{requested_model}}"
          }]
        },
        {
          "type": "timeseries",
          "id": 7,
          "title": "Token Throughput (input vs output)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["sum"]}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"lineInterpolation": "smooth", "spanNulls": false, "fillOpacity": 10}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Input tokens/s"},
                "properties": [{"id": "color", "value": {"fixedColor": "blue", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "Output tokens/s"},
                "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(litellm_input_tokens_metric_total[$__rate_interval]))",
              "legendFormat": "Input tokens/s"
            },
            {
              "refId": "B",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(litellm_output_tokens_metric_total[$__rate_interval]))",
              "legendFormat": "Output tokens/s"
            }
          ]
        },
        {
          "type": "row",
          "id": 8,
          "title": "Latency",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 13}
        },
        {
          "type": "timeseries",
          "id": 9,
          "title": "Latency Percentiles — all models",
          "gridPos": {"h": 8, "w": 14, "x": 0, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {"lineInterpolation": "smooth", "spanNulls": false}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "P99"},
                "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "P95"},
                "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "P50"},
                "properties": [{"id": "color", "value": {"fixedColor": "green", "mode": "fixed"}}]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.50, sum by (le) (rate(litellm_request_total_latency_metric_bucket[$__rate_interval])))",
              "legendFormat": "P50"
            },
            {
              "refId": "B",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.95, sum by (le) (rate(litellm_request_total_latency_metric_bucket[$__rate_interval])))",
              "legendFormat": "P95"
            },
            {
              "refId": "C",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.99, sum by (le) (rate(litellm_request_total_latency_metric_bucket[$__rate_interval])))",
              "legendFormat": "P99"
            }
          ]
        },
        {
          "type": "bargauge",
          "id": 10,
          "title": "P95 Latency by Model (current)",
          "gridPos": {"h": 8, "w": 10, "x": 14, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 2,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 5},
                  {"color": "red", "value": 15}
                ]
              }
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "histogram_quantile(0.95, sum by (le, model) (rate(litellm_request_total_latency_metric_bucket[5m])))",
            "instant": true,
            "legendFormat": "{{model}}"
          }]
        },
        {
          "type": "row",
          "id": 11,
          "title": "Guardrails — Presidio PII Filter",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22}
        },
        {
          "type": "stat",
          "id": 12,
          "title": "Guardrail Invocations — 24 h",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "fixed", "fixedColor": "purple"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]}
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(increase(litellm_guardrail_requests_total[24h]))",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "type": "stat",
          "id": 13,
          "title": "Guardrail Errors — 24 h",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(increase(litellm_guardrail_errors_total[24h]))",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "type": "stat",
          "id": 14,
          "title": "Guardrail P95 Latency",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 3,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.5},
                  {"color": "red", "value": 2}
                ]
              }
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "histogram_quantile(0.95, sum by (le) (rate(litellm_guardrail_latency_seconds_bucket[5m])))",
            "instant": true,
            "legendFormat": ""
          }]
        },
        {
          "type": "timeseries",
          "id": 15,
          "title": "Guardrail Activity",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "tooltip": {"mode": "single"},
            "legend": {"displayMode": "hidden"}
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "fixed", "fixedColor": "purple"},
              "custom": {"fillOpacity": 20, "lineWidth": 1}
            }
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(rate(litellm_guardrail_requests_total[$__rate_interval]))",
            "legendFormat": "req/s"
          }]
        },
        {
          "type": "row",
          "id": 16,
          "title": "Model Health",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 27}
        },
        {
          "type": "table",
          "id": 17,
          "title": "Deployment State",
          "description": "State: 0 = healthy, 1 = cooldown/failed. Successful fallbacks show the router automatically recovered.",
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 28},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "footer": {"show": false},
            "showHeader": true,
            "cellHeight": "sm",
            "sortBy": [{"displayName": "State", "desc": true}]
          },
          "fieldConfig": {
            "defaults": {
              "custom": {"align": "auto", "displayMode": "auto"}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Value"},
                "properties": [
                  {"id": "displayName", "value": "State"},
                  {
                    "id": "mappings",
                    "value": [
                      {"type": "value", "options": {"0": {"text": "healthy", "color": "green", "index": 0}}},
                      {"type": "value", "options": {"1": {"text": "failed", "color": "red", "index": 1}}}
                    ]
                  },
                  {"id": "custom.displayMode", "value": "color-text"}
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns",
                "keepLabels": ["litellm_model_name", "api_provider", "api_base"]
              }
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "litellm_model_name": "Model",
                  "api_provider": "Provider",
                  "api_base": "API Base",
                  "Time": "Time",
                  "Value": "Value"
                },
                "indexByName": {
                  "Model": 0,
                  "Provider": 1,
                  "State": 2,
                  "API Base": 3
                }
              }
            }
          ],
          "targets": [{
            "refId": "A",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "litellm_deployment_state",
            "instant": true,
            "legendFormat": "{{litellm_model_name}}"
          }]
        },
        {
          "type": "row",
          "id": 18,
          "title": "Langfuse — Trace Quality Signals",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 34}
        },
        {
          "type": "table",
          "id": 19,
          "title": "Daily Trace Summary — last 7 days",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 35},
          "datasource": {"type": "yesoreyeram-infinity-datasource", "uid": "langfuse-infinity"},
          "options": {
            "footer": {"show": false},
            "showHeader": true,
            "cellHeight": "sm"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {"align": "auto", "displayMode": "auto"}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Cost (USD)"},
                "properties": [{"id": "unit", "value": "currencyUSD"}, {"id": "decimals", "value": 6}]
              },
              {
                "matcher": {"id": "byName", "options": "Traces"},
                "properties": [{"id": "unit", "value": "short"}]
              }
            ]
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "yesoreyeram-infinity-datasource", "uid": "langfuse-infinity"},
            "type": "json",
            "source": "url",
            "format": "table",
            "url": "http://langfuse-web.langfuse.svc.cluster.local:3000/api/public/metrics/daily?days=7",
            "url_options": {"method": "GET", "data": ""},
            "root_selector": "data",
            "columns": [
              {"selector": "date", "text": "Date", "type": "string"},
              {"selector": "countTraces", "text": "Traces", "type": "number"},
              {"selector": "countObservations", "text": "Observations", "type": "number"},
              {"selector": "totalCost", "text": "Cost (USD)", "type": "number"}
            ]
          }]
        },
        {
          "type": "table",
          "id": 20,
          "title": "Recent Traces — last 20",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 35},
          "datasource": {"type": "yesoreyeram-infinity-datasource", "uid": "langfuse-infinity"},
          "options": {
            "footer": {"show": false},
            "showHeader": true,
            "cellHeight": "sm"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {"align": "auto", "displayMode": "auto"}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Latency (s)"},
                "properties": [{"id": "unit", "value": "s"}, {"id": "decimals", "value": 2}]
              },
              {
                "matcher": {"id": "byName", "options": "Cost (USD)"},
                "properties": [{"id": "unit", "value": "currencyUSD"}, {"id": "decimals", "value": 6}]
              }
            ]
          },
          "targets": [{
            "refId": "A",
            "datasource": {"type": "yesoreyeram-infinity-datasource", "uid": "langfuse-infinity"},
            "type": "json",
            "source": "url",
            "format": "table",
            "url": "http://langfuse-web.langfuse.svc.cluster.local:3000/api/public/traces?limit=20&orderBy=timestamp&order=DESC",
            "url_options": {"method": "GET", "data": ""},
            "root_selector": "data",
            "columns": [
              {"selector": "timestamp", "text": "Time", "type": "string"},
              {"selector": "name", "text": "Name", "type": "string"},
              {"selector": "userId", "text": "User", "type": "string"},
              {"selector": "latency", "text": "Latency (s)", "type": "number"},
              {"selector": "totalCost", "text": "Cost (USD)", "type": "number"},
              {"selector": "countObservations", "text": "Observations", "type": "number"}
            ]
          }]
        }
      ]
    }
