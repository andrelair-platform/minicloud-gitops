apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-cost-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  litellm-cost-dashboard.json: |
    {
      "id": null,
      "uid": "litellm-cost-dept",
      "title": "LiteLLM — Spend & Usage by Department",
      "tags": ["ai", "litellm"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "5m",
      "time": {"from": "now-30d", "to": "now"},
      "panels": [
        {
          "type": "stat",
          "id": 1,
          "title": "Total Spend — last 24 h (USD)",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 6,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none", "colorMode": "background"},
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT NOW() as time, COALESCE(SUM(spend), 0) as \"Spend\" FROM \"LiteLLM_SpendLogs\" WHERE \"startTime\" >= NOW() - INTERVAL '24 hours'",
            "rawQuery": true,
            "format": "time_series",
            "refId": "A"
          }]
        },
        {
          "type": "stat",
          "id": 2,
          "title": "Total Tokens — last 24 h",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none", "colorMode": "background"},
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT NOW() as time, COALESCE(SUM(total_tokens), 0) as \"Tokens\" FROM \"LiteLLM_SpendLogs\" WHERE \"startTime\" >= NOW() - INTERVAL '24 hours'",
            "rawQuery": true,
            "format": "time_series",
            "refId": "A"
          }]
        },
        {
          "type": "stat",
          "id": 3,
          "title": "Requests — last 24 h",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none", "colorMode": "background"},
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT NOW() as time, COUNT(*) as \"Requests\" FROM \"LiteLLM_SpendLogs\" WHERE \"startTime\" >= NOW() - INTERVAL '24 hours'",
            "rawQuery": true,
            "format": "time_series",
            "refId": "A"
          }]
        },
        {
          "type": "stat",
          "id": 4,
          "title": "Active Departments (any spend)",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "color": {"mode": "thresholds"}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none", "colorMode": "background"},
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT NOW() as time, COUNT(DISTINCT vt.key_alias) as \"Depts\" FROM \"LiteLLM_SpendLogs\" sl JOIN \"LiteLLM_VerificationToken\" vt ON sl.api_key = vt.token WHERE sl.\"startTime\" >= NOW() - INTERVAL '30 days' AND vt.key_alias LIKE 'dept-%'",
            "rawQuery": true,
            "format": "time_series",
            "refId": "A"
          }]
        },
        {
          "type": "table",
          "id": 5,
          "title": "Department Budget Utilisation (30-day rolling)",
          "description": "Tiers — Premium (IT/Data/Actuariat/Transformation): $100 · Standard (Cyber/Audit/Finance/Reinsurance/Juridique/Souscription/Commercial): $30 · Basic (Sinistres/Ops/RH/SG): $5",
          "gridPos": {"h": 12, "w": 14, "x": 0, "y": 4},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "defaults": {"custom": {"displayMode": "auto"}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Spend (USD)"}, "properties": [{"id": "unit", "value": "currencyUSD"}, {"id": "decimals", "value": 6}]},
              {"matcher": {"id": "byName", "options": "Budget (USD)"}, "properties": [{"id": "unit", "value": "currencyUSD"}]},
              {
                "matcher": {"id": "byName", "options": "Used %"},
                "properties": [
                  {"id": "unit", "value": "percent"},
                  {"id": "custom.displayMode", "value": "color-background"},
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}}
                ]
              }
            ]
          },
          "options": {"sortBy": [{"displayName": "Spend (USD)", "desc": true}]},
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT key_alias as \"Department\", ROUND(spend::numeric, 6) as \"Spend (USD)\", max_budget as \"Budget (USD)\", budget_duration as \"Period\", CASE WHEN max_budget > 0 THEN ROUND((spend / max_budget * 100)::numeric, 1) ELSE 0 END as \"Used %\" FROM \"LiteLLM_VerificationToken\" WHERE key_alias LIKE 'dept-%' ORDER BY spend DESC",
            "rawQuery": true,
            "format": "table",
            "refId": "A"
          }]
        },
        {
          "type": "bargauge",
          "id": 6,
          "title": "Token Usage by Model — last 30 d",
          "gridPos": {"h": 12, "w": 10, "x": 14, "y": 4},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"}
            }
          },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT model as \"metric\", SUM(total_tokens) as \"Tokens\" FROM \"LiteLLM_SpendLogs\" WHERE \"startTime\" >= NOW() - INTERVAL '30 days' GROUP BY model ORDER BY \"Tokens\" DESC LIMIT 12",
            "rawQuery": true,
            "format": "table",
            "refId": "A"
          }]
        },
        {
          "type": "table",
          "id": 7,
          "title": "Requests by Model — last 30 d",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "overrides": [
              {"matcher": {"id": "byName", "options": "Spend (USD)"}, "properties": [{"id": "unit", "value": "currencyUSD"}, {"id": "decimals", "value": 6}]}
            ]
          },
          "options": {"sortBy": [{"displayName": "Requests", "desc": true}]},
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT model as \"Model\", COUNT(*) as \"Requests\", SUM(total_tokens) as \"Tokens\", ROUND(SUM(spend)::numeric, 6) as \"Spend (USD)\" FROM \"LiteLLM_SpendLogs\" WHERE \"startTime\" >= NOW() - INTERVAL '30 days' GROUP BY model ORDER BY \"Requests\" DESC",
            "rawQuery": true,
            "format": "table",
            "refId": "A"
          }]
        },
        {
          "type": "table",
          "id": 8,
          "title": "Recent Requests (last 50)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "postgres", "uid": "litellm-postgres"},
          "fieldConfig": {
            "overrides": [
              {"matcher": {"id": "byName", "options": "spend"}, "properties": [{"id": "unit", "value": "currencyUSD"}, {"id": "decimals", "value": 6}]}
            ]
          },
          "targets": [{
            "datasource": {"type": "postgres", "uid": "litellm-postgres"},
            "rawSql": "SELECT sl.\"startTime\" as \"Time\", vt.key_alias as \"Department\", sl.model as \"Model\", sl.total_tokens as \"Tokens\", sl.spend as \"Spend\" FROM \"LiteLLM_SpendLogs\" sl LEFT JOIN \"LiteLLM_VerificationToken\" vt ON sl.api_key = vt.token ORDER BY sl.\"startTime\" DESC LIMIT 50",
            "rawQuery": true,
            "format": "table",
            "refId": "A"
          }]
        }
      ]
    }
