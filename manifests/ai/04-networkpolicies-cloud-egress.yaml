---
# Allow LiteLLM pods to reach cloud model providers (Groq, etc.) on port 443.
# Scoped to app=litellm only — Ollama and Open WebUI remain internet-blocked.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-litellm-cloud-egress
  namespace: ai
spec:
  podSelector:
    matchLabels:
      app: litellm
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
