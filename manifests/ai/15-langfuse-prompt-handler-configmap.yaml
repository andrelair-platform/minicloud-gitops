# AUTO-GENERATED — do not edit directly.
# Source of truth: minicloud-litellm-custom/langfuse_prompt_handler.py
# Changes pushed to that file trigger this sync via CI.
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-prompt-handler
  namespace: ai
  annotations:
    # Mounted into the LiteLLM pod at /app/langfuse_prompt_handler.py
    # (see manifests/ai/01-litellm-deployment.yaml volumeMount subPath: handler.py).
    # Updating this ConfigMap + restarting the LiteLLM deployment is all that is needed
    # to change the handler logic — no image rebuild required.
data:
  handler.py: |
    """
    LangfusePromptHandler — LiteLLM CustomLogger
    =============================================
    Two responsibilities (run for every request):

    1. Metadata tagging (ALL models)
       Injects department, use_case, and tags into data["metadata"] so that
       Langfuse traces are tagged with the correct business context.
       Mapping: phi3-financial → finance / financial-advisory
                everything else → general / general-assistant

    2. System-prompt injection (phi3-financial only)
       Fetches the production-labelled system prompt from Langfuse and prepends
       it, stripping any caller-supplied system message to prevent guardrail bypass.

    Prompt source:  Langfuse Prompt Management → name="phi3-financial-system", label="production"
    Cache TTL:      5 minutes (in-process, per LiteLLM worker)
    Fail-open:      if Langfuse is unreachable, serves the stale cached prompt, then falls back
                    to the PHI3_FINANCIAL_SYSTEM_PROMPT env var (set from the ConfigMap)

    Rollback flow:
      1. In Langfuse UI → Prompt Management → phi3-financial-system → set old version as "production"
      2. Wait up to 5 minutes for the cache to expire (or restart the LiteLLM pod for immediate effect)
      3. All new requests automatically use the rolled-back prompt — no git push, no ollama create
    """

    import logging
    import os
    import time
    from typing import Optional

    logger = logging.getLogger(__name__)

    _CACHE_TTL_SECONDS = 300  # 5 minutes
    _cache: dict = {}          # {"text": str, "expires_at": float}

    PROMPT_NAME  = "phi3-financial-system"
    PROMPT_LABEL = "production"
    TARGET_MODEL = "phi3-financial"

    # department/use_case tags injected into every Langfuse trace
    _MODEL_METADATA: dict[str, dict] = {
        "phi3-financial": {
            "department": "finance",
            "use_case": "financial-advisory",
            "tags": ["department:finance", "use_case:financial-advisory"],
        },
    }
    _DEFAULT_METADATA: dict = {
        "department": "general",
        "use_case": "general-assistant",
        "tags": ["department:general", "use_case:general-assistant"],
    }


    async def _fetch_prompt() -> Optional[str]:
        """Return production system prompt, refreshing from Langfuse when cache expires."""
        now = time.monotonic()
        if _cache.get("expires_at", 0) > now and "text" in _cache:
            return _cache["text"]

        try:
            from langfuse import Langfuse  # already installed in LiteLLM venv
            lf = Langfuse(
                public_key=os.environ["LANGFUSE_PUBLIC_KEY"],
                secret_key=os.environ["LANGFUSE_SECRET_KEY"],
                host=os.environ.get(
                    "LANGFUSE_HOST",
                    "http://langfuse-web.langfuse.svc.cluster.local:3000",
                ),
            )
            prompt = lf.get_prompt(PROMPT_NAME, label=PROMPT_LABEL)
            _cache["text"]       = prompt.prompt
            _cache["expires_at"] = now + _CACHE_TTL_SECONDS
            logger.info(
                "[LangfusePromptHandler] Refreshed '%s' label=%s (TTL %ds)",
                PROMPT_NAME, PROMPT_LABEL, _CACHE_TTL_SECONDS,
            )
            return _cache["text"]

        except Exception as exc:
            logger.warning(
                "[LangfusePromptHandler] Langfuse fetch failed (%s). "
                "Serving %s.",
                exc,
                "stale cache" if "text" in _cache else "ConfigMap env var fallback",
            )
            # Fail-open priority: stale cache → ConfigMap env var → None (no injection)
            if "text" in _cache:
                return _cache["text"]
            return os.environ.get("PHI3_FINANCIAL_SYSTEM_PROMPT")


    try:
        from litellm.integrations.custom_logger import CustomLogger as _Base
    except ImportError:
        _Base = object  # type: ignore[assignment,misc]


    class _LangfusePromptHandler(_Base):  # type: ignore[misc]
        """
        Registered in litellm config.yaml under litellm_settings.callbacks.

        For every request:
        - Injects department/use_case metadata into data["metadata"] for Langfuse tagging
        For phi3-financial requests additionally:
        - Fetches the production prompt from Langfuse (cached 5 min)
        - Strips any existing system message (prevents prompt-injection via system turn)
        - Prepends the Langfuse prompt as the sole system message
        """

        async def async_pre_call_hook(
            self,
            user_api_key_dict,
            cache,
            data: dict,
            call_type: str,
        ) -> dict:
            # ── 1. Metadata tagging (all models) ────────────────────────────────
            model = data.get("model", "")
            meta = _MODEL_METADATA.get(model, _DEFAULT_METADATA)
            md = data.setdefault("metadata", {})
            md.setdefault("department", meta["department"])
            md.setdefault("use_case", meta["use_case"])
            existing_tags: list = md.setdefault("tags", [])
            for tag in meta["tags"]:
                if tag not in existing_tags:
                    existing_tags.append(tag)

            # ── 2. System-prompt injection (phi3-financial only) ─────────────────
            if model != TARGET_MODEL:
                return data

            system_prompt = await _fetch_prompt()
            if not system_prompt:
                logger.error(
                    "[LangfusePromptHandler] No prompt available for '%s' — "
                    "request proceeds without system message.", TARGET_MODEL,
                )
                return data

            # Remove any existing system message then inject ours as the first message.
            # This prevents a user from overriding guardrails by sending a system turn
            # through an API key that has system-message permissions.
            messages = [m for m in data.get("messages", []) if m.get("role") != "system"]
            data["messages"] = [{"role": "system", "content": system_prompt}] + messages
            logger.debug(
                "[LangfusePromptHandler] Injected system prompt for '%s' (%d chars)",
                TARGET_MODEL, len(system_prompt),
            )
            return data


    # Module-level instance required by LiteLLM's get_instance_fn:
    # that function calls getattr(module, "LangfusePromptHandler") and returns whatever
    # it finds — a class instead of an instance causes "missing self" errors at call time.
    LangfusePromptHandler = _LangfusePromptHandler()
