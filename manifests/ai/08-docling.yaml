---
# Docling Serve — document OCR/conversion service for Open WebUI RAG ingestion.
# CPU-only image (4.4 GB) bundles all model weights — no internet egress needed at runtime.
# Open WebUI calls POST /v1/convert/file and reads response.document.md_content.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling
  template:
    metadata:
      labels:
        app: docling
    spec:
      containers:
        - name: docling-serve
          image: ghcr.io/docling-project/docling-serve-cpu:v1.26.0
          ports:
            - containerPort: 5001
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 6Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /ready
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: docling
  namespace: ai
spec:
  selector:
    app: docling
  ports:
    - port: 5001
      targetPort: 5001
