---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homer
data:
  config.yml: |
    title: Mini Cloud Platform
    subtitle: "Private Bare-Metal Infrastructure — GitOps via ArgoCD"
    header: true
    footer: false
    colors:
      light:
        highlight-primary: '#3367d6'
        highlight-secondary: '#4285f4'
        highlight-hover: '#5a95f5'
        background: '#f2f4f8'
        card-background: '#ffffff'
        text: '#363636'
        text-header: '#ffffff'
        text-title: '#303030'
        text-subtitle: '#424242'
        card-shadow: rgba(0, 0, 0, 0.1)
        link: '#3273dc'
        link-hover: '#363636'
      dark:
        highlight-primary: '#3367d6'
        highlight-secondary: '#4285f4'
        highlight-hover: '#5a95f5'
        background: '#131313'
        card-background: '#2b2b2b'
        text: '#eaeaea'
        text-header: '#ffffff'
        text-title: '#fafafa'
        text-subtitle: '#f5f5f5'
        card-shadow: rgba(0, 0, 0, 0.4)
        link: '#3273dc'
        link-hover: '#ffdd57'
    services:
    - name: Infrastructure
      icon: fas fa-server
      items:
      - name: MAAS
        icon: fas fa-network-wired
        subtitle: "Bare-metal provisioning — 5-node k3s cluster — Tailscale only"
        tag: internal
        url: http://100.88.123.8:5240/MAAS
        target: _blank
      - name: Harbor
        icon: fas fa-anchor
        subtitle: "Sovereign container registry — proxy caches + library project — OIDC via Authentik"
        tag: SSO
        url: https://harbor.devandre.sbs
        target: _blank
      - name: MinIO
        icon: fas fa-database
        subtitle: "S3 object store — Velero backup target — Tailscale only"
        tag: internal
        url: http://100.88.123.8:9001
        target: _blank
      - name: GitHub
        icon: fab fa-github
        subtitle: "Source of truth — andrelair-platform org"
        tag: live
        url: https://github.com/orgs/andrelair-platform/repositories
        target: _blank
    - name: Observability
      icon: fas fa-chart-line
      items:
      - name: Grafana
        icon: fas fa-chart-bar
        subtitle: "Dashboards & metrics visualization — OIDC via Authentik"
        tag: SSO
        url: https://grafana.devandre.sbs
        target: _blank
      - name: Prometheus
        icon: fas fa-fire
        subtitle: "Metrics scraping & storage — Tailscale only"
        tag: internal
        url: https://prometheus.10.0.0.200.nip.io
        target: _blank
      - name: Alertmanager
        icon: fas fa-bell
        subtitle: "Alert routing & silencing — Tailscale only"
        tag: internal
        url: https://alertmanager.10.0.0.200.nip.io
        target: _blank
      - name: Polaris
        icon: fas fa-star
        subtitle: "Workload best-practice scorer — resource limits, security context — Tailscale only"
        tag: internal
        url: https://polaris.10.0.0.200.nip.io
        target: _blank
    - name: Identity & Secrets
      icon: fas fa-shield-alt
      items:
      - name: Authentik
        icon: fas fa-key
        subtitle: "SSO + IAM — OIDC provider for all platform services, forward-auth proxy"
        tag: SSO
        url: https://auth.devandre.sbs
        target: _blank
      - name: Vault
        icon: fas fa-lock
        subtitle: "Secrets management — HashiCorp Vault, AWS KMS auto-unseal, ESO sync"
        tag: live
        url: https://vault.devandre.sbs
        target: _blank
      - name: Vaultwarden
        icon: fas fa-user-shield
        subtitle: "Password manager — Bitwarden-compatible — OIDC via Authentik"
        tag: SSO
        url: https://vault-pw.devandre.sbs
        target: _blank
    - name: Platform & DevOps
      icon: fas fa-code-branch
      items:
      - name: ArgoCD
        icon: fas fa-sync
        subtitle: "GitOps continuous reconciliation — all cluster state from git — OIDC via Authentik"
        tag: SSO
        url: https://argocd.devandre.sbs
        target: _blank
      - name: Backstage
        icon: fas fa-th-large
        subtitle: "Internal Developer Portal — catalog, API docs, Tech Radar, Software Templates — OIDC via Authentik"
        tag: SSO
        url: https://backstage.devandre.sbs
        target: _blank
      - name: Plane
        icon: fas fa-tasks
        subtitle: "Project & issue tracking — Plane CE — minicloud-plane API integration"
        tag: live
        url: https://plane.devandre.sbs
        target: _blank
      - name: NATS
        icon: fas fa-bolt
        subtitle: "Message broker — 3-replica JetStream HA, KEDA event-driven autoscaling"
        tag: live
        url: https://nats.devandre.sbs
        target: _blank
    - name: AI / ML
      icon: fas fa-robot
      items:
      - name: Chat
        icon: fas fa-comments
        subtitle: "Open WebUI — LiteLLM gateway, RAG pipeline, web search — OIDC via Authentik"
        tag: SSO
        url: https://chat.devandre.sbs
        target: _blank
      - name: LiteLLM Admin
        icon: fas fa-sliders-h
        subtitle: "AI Gateway admin — virtual keys, budget governance, cloud + local provider routing"
        tag: admin
        url: https://litellm.devandre.sbs/ui
        target: _blank
      - name: Langfuse
        icon: fas fa-chart-line
        subtitle: "LLM observability — traces, scores, prompt versioning, eval datasets"
        tag: AI
        url: https://langfuse.devandre.sbs
        target: _blank
    - name: Collaboration & Showcase
      icon: fas fa-cubes
      items:
      - name: Mail
        icon: fas fa-envelope
        subtitle: "Self-hosted email — Stalwart Mail Server, webmail + IMAP/SMTP — OIDC via Authentik"
        tag: SSO
        url: https://mail.devandre.sbs
        target: _blank
      - name: Sign
        icon: fas fa-file-signature
        subtitle: "e-Signature platform — Docuseal, PDF templates, audit trail, eIDAS-compatible"
        tag: SSO
        url: https://sign.devandre.sbs
        target: _blank
      - name: Element
        icon: fas fa-comments
        subtitle: "Self-hosted Matrix chat — Synapse homeserver, E2E encryption — OIDC via Authentik"
        tag: SSO
        url: https://element.devandre.sbs
        target: _blank
      - name: Jitsi Meet
        icon: fas fa-video
        subtitle: "Self-hosted video conferencing — Spaces, screen share — OIDC via Authentik"
        tag: SSO
        url: https://meet.devandre.sbs
        target: _blank
      - name: Nextcloud
        icon: fas fa-cloud
        subtitle: "Document collaboration & file sharing — OnlyOffice integration — OIDC via Authentik"
        tag: SSO
        url: https://cloud.devandre.sbs
        target: _blank
      - name: ktayl-solution
        icon: fas fa-briefcase
        subtitle: "Insurance consulting platform — 7 Lines of Business (Astro + Tailwind)"
        tag: live
        url: https://ktayl.devandre.sbs
        target: _blank
      - name: platform-demo
        icon: fas fa-rocket
        subtitle: "CI/CD golden path demo — GHA → Harbor → ArgoCD canary rollout"
        tag: live
        url: https://demo.devandre.sbs
        target: _blank
