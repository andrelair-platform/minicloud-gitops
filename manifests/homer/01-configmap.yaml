---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homer
data:
  config.yml: |
    title: Mini Cloud Platform
    subtitle: "Private Bare-Metal Infrastructure — GitOps via ArgoCD"
    header: true
    footer: false
    colors:
      light:
        highlight-primary: '#3367d6'
        highlight-secondary: '#4285f4'
        highlight-hover: '#5a95f5'
        background: '#f2f4f8'
        card-background: '#ffffff'
        text: '#363636'
        text-header: '#ffffff'
        text-title: '#303030'
        text-subtitle: '#424242'
        card-shadow: rgba(0, 0, 0, 0.1)
        link: '#3273dc'
        link-hover: '#363636'
      dark:
        highlight-primary: '#3367d6'
        highlight-secondary: '#4285f4'
        highlight-hover: '#5a95f5'
        background: '#131313'
        card-background: '#2b2b2b'
        text: '#eaeaea'
        text-header: '#ffffff'
        text-title: '#fafafa'
        text-subtitle: '#f5f5f5'
        card-shadow: rgba(0, 0, 0, 0.4)
        link: '#3273dc'
        link-hover: '#ffdd57'
    services:
    - name: Infrastructure
      icon: fas fa-server
      items:
      - name: MAAS
        icon: fas fa-network-wired
        subtitle: Bare-metal provisioning
        tag: infra
        url: http://10.0.0.1:5240/MAAS
        target: _blank
      - name: set-hog
        icon: fas fa-microchip
        subtitle: "Control plane — 10.0.0.2"
        tag: k8s
        url: http://10.0.0.1:5240/MAAS/r/machines
        target: _blank
      - name: fast-skunk
        icon: fas fa-microchip
        subtitle: "Worker — 10.0.0.4"
        tag: k8s
        url: http://10.0.0.1:5240/MAAS/r/machines
        target: _blank
      - name: fast-heron
        icon: fas fa-microchip
        subtitle: "Worker — 10.0.0.7"
        tag: k8s
        url: http://10.0.0.1:5240/MAAS/r/machines
        target: _blank
    - name: Observability
      icon: fas fa-chart-line
      items:
      - name: Grafana
        icon: fas fa-chart-bar
        subtitle: Dashboards & metrics visualization
        tag: live
        url: https://grafana.10.0.0.200.nip.io
        target: _blank
      - name: Prometheus
        icon: fas fa-fire
        subtitle: "Metrics — internal (kubectl port-forward svc/kps-prometheus -n monitoring 9090)"
        tag: internal
        url: '#'
        target: _blank
      - name: Alertmanager
        icon: fas fa-bell
        subtitle: "Alerts — internal (kubectl port-forward svc/kps-alertmanager -n monitoring 9093)"
        tag: internal
        url: '#'
        target: _blank
    - name: DevOps
      icon: fas fa-code-branch
      items:
      - name: ArgoCD
        icon: fas fa-sync
        subtitle: GitOps continuous reconciliation
        tag: live
        url: https://argocd.10.0.0.200.nip.io
        target: _blank
      - name: GitLab
        icon: fas fa-code
        subtitle: "CI/CD — Phase 13"
        tag: soon
        url: http://10.0.0.2:80
        target: _blank
      - name: Harbor
        icon: fas fa-anchor
        subtitle: 'Sovereign registry: 4 proxy caches (docker-hub, ghcr, quay, k8s-registry) + library project'
        tag: live
        url: https://harbor.10.0.0.200.nip.io
        target: _blank
      - name: MinIO
        icon: fas fa-database
        subtitle: "S3 object store — Velero backup target (Phase 14)"
        tag: live
        url: http://100.88.123.8:9001
        target: _blank
    - name: Apps
      icon: fas fa-cubes
      items:
      - name: podinfo
        icon: fas fa-cube
        subtitle: "Demo Go web app — first integration workload"
        tag: live
        url: https://podinfo.10.0.0.200.nip.io
        target: _blank
      - name: whoami
        icon: fas fa-question-circle
        subtitle: "Demo — proves ArgoCD git-push deploy loop"
        tag: demo
        url: https://whoami.10.0.0.200.nip.io
        target: _blank
      - name: platform-demo
        icon: fas fa-rocket
        subtitle: "CI/CD pipeline demo (GHA → ghcr.io → ArgoCD)"
        tag: live
        url: https://platform-demo.10.0.0.200.nip.io
        target: _blank
      - name: NATS
        icon: fas fa-bolt
        subtitle: "Message broker (3-replica HA + JetStream) — KEDA scales workers from 0"
        tag: live
        url: https://nats.10.0.0.200.nip.io
        target: _blank
      - name: Backstage
        icon: fas fa-th-large
        subtitle: "Internal Developer Portal — service catalog (Phase 18)"
        tag: live
        url: https://backstage.10.0.0.200.nip.io
        target: _blank
      - name: Chat
        icon: fas fa-robot
        subtitle: "Open WebUI + Ollama (llama3.2:3b on CPU) — Phase 19"
        tag: live
        url: https://chat.10.0.0.200.nip.io
        target: _blank
