---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homer
data:
  config.yml: |
    title: Mini Cloud Platform
    subtitle: "Private Bare-Metal Infrastructure — GitOps via ArgoCD"
    header: true
    footer: false
    colors:
      light:
        highlight-primary: '#3367d6'
        highlight-secondary: '#4285f4'
        highlight-hover: '#5a95f5'
        background: '#f2f4f8'
        card-background: '#ffffff'
        text: '#363636'
        text-header: '#ffffff'
        text-title: '#303030'
        text-subtitle: '#424242'
        card-shadow: rgba(0, 0, 0, 0.1)
        link: '#3273dc'
        link-hover: '#363636'
      dark:
        highlight-primary: '#3367d6'
        highlight-secondary: '#4285f4'
        highlight-hover: '#5a95f5'
        background: '#131313'
        card-background: '#2b2b2b'
        text: '#eaeaea'
        text-header: '#ffffff'
        text-title: '#fafafa'
        text-subtitle: '#f5f5f5'
        card-shadow: rgba(0, 0, 0, 0.4)
        link: '#3273dc'
        link-hover: '#ffdd57'
    services:
    - name: Infrastructure
      icon: fas fa-server
      items:
      - name: MAAS
        icon: fas fa-network-wired
        subtitle: "Bare-metal provisioning — Tailscale only"
        tag: internal
        url: http://100.88.123.8:5240/MAAS
        target: _blank
      - name: set-hog
        icon: fas fa-microchip
        subtitle: "Control plane — 10.0.0.2"
        tag: k8s
        url: http://100.88.123.8:5240/MAAS/r/machines
        target: _blank
      - name: fast-skunk
        icon: fas fa-microchip
        subtitle: "Worker — 10.0.0.4"
        tag: k8s
        url: http://100.88.123.8:5240/MAAS/r/machines
        target: _blank
      - name: fast-heron
        icon: fas fa-microchip
        subtitle: "Worker — 10.0.0.7"
        tag: k8s
        url: http://100.88.123.8:5240/MAAS/r/machines
        target: _blank
    - name: Observability
      icon: fas fa-chart-line
      items:
      - name: Grafana
        icon: fas fa-chart-bar
        subtitle: "Dashboards & metrics visualization — OIDC via Authentik"
        tag: SSO
        url: https://grafana.devandre.sbs
        target: _blank
      - name: Prometheus
        icon: fas fa-fire
        subtitle: "Metrics — Tailscale only"
        tag: internal
        url: https://prometheus.10.0.0.200.nip.io
        target: _blank
      - name: Alertmanager
        icon: fas fa-bell
        subtitle: "Alerts — Tailscale only"
        tag: internal
        url: https://alertmanager.10.0.0.200.nip.io
        target: _blank
    - name: Identity
      icon: fas fa-id-badge
      items:
      - name: Authentik
        icon: fas fa-key
        subtitle: "SSO + IAM — OIDC for ArgoCD/Grafana/Harbor/MinIO/Chat, forward-auth for the rest"
        tag: SSO
        url: https://auth.devandre.sbs
        target: _blank
      - name: Vaultwarden
        icon: fas fa-shield-alt
        subtitle: "Password & credential manager — OIDC via Authentik (Bitwarden-compatible)"
        tag: SSO
        url: https://vault-pw.devandre.sbs
        target: _blank
    - name: DevOps
      icon: fas fa-code-branch
      items:
      - name: ArgoCD
        icon: fas fa-sync
        subtitle: "GitOps continuous reconciliation — OIDC via Authentik"
        tag: SSO
        url: https://argocd.devandre.sbs
        target: _blank
      - name: GitHub
        icon: fab fa-github
        subtitle: "Source of truth — andrelair-platform org (7 repos)"
        tag: live
        url: https://github.com/orgs/andrelair-platform/repositories
        target: _blank
      - name: Harbor
        icon: fas fa-anchor
        subtitle: "Sovereign registry: 4 proxy caches + library project — OIDC via Authentik"
        tag: SSO
        url: https://harbor.devandre.sbs
        target: _blank
      - name: MinIO
        icon: fas fa-database
        subtitle: "S3 object store — Velero backup target — Tailscale only"
        tag: internal
        url: http://100.88.123.8:9001
        target: _blank
    - name: Apps
      icon: fas fa-cubes
      items:
      - name: platform-demo
        icon: fas fa-rocket
        subtitle: "CI/CD pipeline demo (GHA → ghcr.io → ArgoCD) — forward-auth via Authentik"
        tag: SSO
        url: https://demo.devandre.sbs
        target: _blank
      - name: Backstage
        icon: fas fa-th-large
        subtitle: "Internal Developer Portal — OIDC via Authentik"
        tag: SSO
        url: https://backstage.devandre.sbs
        target: _blank
      - name: Chat
        icon: fas fa-robot
        subtitle: "Open WebUI + LiteLLM AI Gateway (phi3-financial, llama3.2:3b/1b) — OIDC via Authentik"
        tag: SSO
        url: https://chat.devandre.sbs
        target: _blank
      - name: LiteLLM Admin
        icon: fas fa-sliders-h
        subtitle: "AI Gateway admin panel — manage virtual keys, budgets, model routing"
        tag: admin
        url: https://litellm.devandre.sbs/ui
        target: _blank
      - name: Langfuse
        icon: fas fa-chart-line
        subtitle: "LLM observability — traces, evaluations, prompt management"
        tag: AI
        url: https://langfuse.devandre.sbs
        target: _blank
      - name: NATS
        icon: fas fa-bolt
        subtitle: "Message broker (3-replica HA + JetStream) — KEDA scales workers from 0"
        tag: live
        url: https://nats.devandre.sbs
        target: _blank
      - name: Nextcloud
        icon: fas fa-cloud
        subtitle: "Document collaboration & file sharing — OIDC via Authentik"
        tag: SSO
        url: https://cloud.devandre.sbs
        target: _blank
      - name: Vault
        icon: fas fa-lock
        subtitle: "Secrets management — HashiCorp Vault"
        tag: live
        url: https://vault.devandre.sbs
        target: _blank
      - name: ktayl-solution
        icon: fas fa-briefcase
        subtitle: "Insurance consulting showcase — 7 Lines of Business (Astro + Tailwind)"
        tag: live
        url: https://ktayl.devandre.sbs
        target: _blank
      - name: podinfo
        icon: fas fa-cube
        subtitle: "Demo Go web app — internal only (Tailscale)"
        tag: internal
        url: https://podinfo.10.0.0.200.nip.io
        target: _blank
      - name: whoami
        icon: fas fa-question-circle
        subtitle: "Debug workload — internal only (Tailscale)"
        tag: internal
        url: https://whoami.10.0.0.200.nip.io
        target: _blank
