---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homer
  namespace: homer
  annotations:
    # --- Phase 23 Stage 2 — Authentik forward-auth ---
    # Domain-level forward-auth via Authentik embedded Outpost
    # (cookie domain 10.0.0.200.nip.io covers all *.10.0.0.200.nip.io subdomains).
    # Auth flow: unauth -> 302 to auth.10.0.0.200.nip.io login -> 302 back with cookie.
    nginx.ingress.kubernetes.io/server-snippet: |
      location /outpost.goauthentik.io {
          proxy_pass              http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io;
          proxy_set_header        Host $host;
          proxy_set_header        X-Original-URL $scheme://$http_host$request_uri;
          add_header              Set-Cookie $auth_cookie;
          auth_request_set        $auth_cookie $upstream_http_set_cookie;
          proxy_pass_request_body off;
          proxy_set_header        Content-Length "";
      }
      location @goauthentik_proxy_signin {
          internal;
          add_header Set-Cookie $auth_cookie;
          return 302 /outpost.goauthentik.io/start?rd=$request_uri;
      }
    nginx.ingress.kubernetes.io/configuration-snippet: |
      auth_request     /outpost.goauthentik.io/auth/nginx;
      error_page       401 = @goauthentik_proxy_signin;
      auth_request_set $auth_cookie $upstream_http_set_cookie;
      add_header       Set-Cookie $auth_cookie;
      auth_request_set $authentik_username $upstream_http_x_authentik_username;
      auth_request_set $authentik_groups   $upstream_http_x_authentik_groups;
      auth_request_set $authentik_email    $upstream_http_x_authentik_email;
      proxy_set_header X-authentik-username $authentik_username;
      proxy_set_header X-authentik-groups   $authentik_groups;
      proxy_set_header X-authentik-email    $authentik_email;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - homer.10.0.0.200.nip.io
      secretName: homer-tls
    - hosts:
        - homer.devandre.sbs
      secretName: homer-tls
  rules:
  - host: homer.10.0.0.200.nip.io
    http:
      paths:
      - backend:
          service:
            name: homer
            port:
              number: 8080
        path: /
        pathType: Prefix
  - host: homer.devandre.sbs
    http:
      paths:
      - backend:
          service:
            name: homer
            port:
              number: 8080
        path: /
        pathType: Prefix
