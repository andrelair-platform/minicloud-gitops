---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer
  namespace: homer
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: homer
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        # Bump this whenever 01-configmap.yaml changes — Homer mounts the
        # ConfigMap with subPath, which Kubernetes does NOT auto-propagate.
        # The annotation change makes the pod-template-hash differ and
        # forces a rolling restart, picking up the new ConfigMap content.
        # Production teams automate this via Reloader or kustomize
        # configMapGenerator (which generates suffixed names).
        config-checksum: "v4-platform-demo-tile"
      labels:
        app: homer
    spec:
      containers:
      - image: b4bz/homer:latest
        imagePullPolicy: Always
        name: homer
        ports:
        - containerPort: 8080
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /www/assets/config.yml
          name: config
          subPath: config.yml
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: homer-config
        name: config

