---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: gitops-demo
  labels:
    app: whoami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
        backstage.io/kubernetes-id: whoami
    spec:
      affinity:
        # Soft anti-affinity: spread across both workers when possible.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: whoami
                topologyKey: kubernetes.io/hostname
      containers:
        - name: whoami
          image: docker.io/traefik/whoami:v1.10.4
          args:
            - --port=80
          ports:
            - containerPort: 80
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
