apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backup-dr
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kps
spec:
  groups:
    - name: backup-dr
      rules:
        - alert: VeleroBackupFailed
          expr: |
            increase(velero_backup_failure_total{schedule="velero-daily-full"}[26h]) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Velero daily backup failed"
            description: "The velero-daily-full schedule produced a failed backup in the last 26 hours. Check MinIO disk space and velero pod logs."

        - alert: VeleroNoRecentBackup
          expr: |
            (time() - velero_backup_last_successful_timestamp{schedule="velero-daily-full"}) / 3600 > 25
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "No successful Velero backup in 25+ hours"
            description: "Last successful velero-daily-full backup was {{ $value | printf \"%.1f\" }} hours ago. Expected cadence: every 24h at 03:00 UTC."

        - alert: VeleroBackupStorageLocationUnavailable
          expr: |
            velero_backup_location_status_gauge == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Velero BackupStorageLocation unavailable"
            description: "BackupStorageLocation {{ $labels.backup_storage_location }} is unavailable. MinIO may be down or disk full."

        - alert: MinioDiskFull
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Controller disk < 10% free — backups at risk"
            description: "Root filesystem on {{ $labels.instance }} has {{ $value | printf \"%.1f\" }}% free. Velero/MinIO backups will fail below MinIO's minimum free threshold."

        - alert: ControllerDiskWarning
          expr: |
            (1 - node_filesystem_avail_bytes{instance="controller", mountpoint="/"} / node_filesystem_size_bytes{instance="controller", mountpoint="/"}) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Controller disk > 85% used"
            description: "Controller root filesystem is {{ $value | humanizePercentage }} used. Free up k3s snapshots or journal before MinIO goes down (happens at ~94%)."

        - alert: ControllerDiskCritical
          expr: |
            (1 - node_filesystem_avail_bytes{instance="controller", mountpoint="/"} / node_filesystem_size_bytes{instance="controller", mountpoint="/"}) > 0.90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Controller disk > 90% used — MinIO at risk"
            description: "Controller root filesystem is {{ $value | humanizePercentage }} used. MinIO will stop accepting writes and its systemd service may crash. Delete k3s snapshots immediately: ls /srv/backups/k3s/ | sort | head -n -5 | xargs -I{} rm /srv/backups/k3s/{}"

    - name: cluster-health
      rules:
        - alert: PodStuckTerminating
          expr: |
            (time() - kube_pod_deletion_timestamp) > 300
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck Terminating > 5 min"
            description: |
              Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in Terminating state for
              {{ $value | humanizeDuration }}. The kubelet on its node may be unresponsive.
              Fix: kubectl delete pod {{ $labels.pod }} -n {{ $labels.namespace }} --grace-period=0 --force
              If the pod uses a Longhorn RWO PVC, also delete the stale VolumeAttachment:
              kubectl get volumeattachment | grep <pvc-id>
              kubectl delete volumeattachment <name>

        - alert: VaultPodRestarted
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="vault", pod=~"vault-0"}[15m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Vault pod restarted — check ESO ClusterSecretStore"
            description: |
              vault-0 restarted. After Vault becomes Ready, ESO may not reconnect automatically.
              Check: kubectl get clustersecretstore vault-backend -o jsonpath='{.status.conditions[0].status}'
              If not True: kubectl rollout restart deploy/external-secrets -n external-secrets
              Verify: kubectl get externalsecret -A | grep -v True

        - alert: ESOClusterSecretStoreNotReady
          expr: |
            kube_pod_container_status_restarts_total{namespace="external-secrets"} > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "External Secrets Operator has restarted — verify Vault connectivity"
            description: |
              The external-secrets controller has restarted. Check if the ClusterSecretStore is healthy:
              kubectl get clustersecretstore vault-backend -o jsonpath='{.status.conditions[0].reason}'
              If SecretStoreNotReady: wait for Vault Ready, then:
              kubectl rollout restart deploy/external-secrets -n external-secrets
