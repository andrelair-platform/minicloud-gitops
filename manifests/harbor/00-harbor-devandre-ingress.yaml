apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor-devandre
  namespace: harbor
  annotations:
    nginx.org/client-max-body-size: "0"
    nginx.org/redirect-to-https: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: harbor.devandre.sbs
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: harbor-core
                port:
                  number: 80
          - path: /service/
            pathType: Prefix
            backend:
              service:
                name: harbor-core
                port:
                  number: 80
          - path: /v2/
            pathType: Prefix
            backend:
              service:
                name: harbor-core
                port:
                  number: 80
          - path: /c/
            pathType: Prefix
            backend:
              service:
                name: harbor-core
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: harbor-portal
                port:
                  number: 80
