apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snoprivilegeescalation
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    metadata.gatekeeper.sh/title: "No Privilege Escalation"
    metadata.gatekeeper.sh/description: "All containers must set allowPrivilegeEscalation:false to prevent setuid/setgid escalation."
spec:
  crd:
    spec:
      names:
        kind: K8sNoPrivilegeEscalation
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snoprivilegeescalation

        # Collect containers from Pod and Deployment/StatefulSet/DaemonSet paths.
        containers[c] {
          c := input.review.object.spec.containers[_]
        }
        containers[c] {
          c := input.review.object.spec.template.spec.containers[_]
        }
        containers[c] {
          c := input.review.object.spec.initContainers[_]
        }
        containers[c] {
          c := input.review.object.spec.template.spec.initContainers[_]
        }

        violation[{"msg": msg}] {
          c := containers[_]
          c.securityContext.allowPrivilegeEscalation != false
          msg := sprintf("Container '%v' must set allowPrivilegeEscalation:false", [c.name])
        }
