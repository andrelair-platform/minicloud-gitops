apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRegistries
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: allowed-registries
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            # k8s system
            - kube-system
            - kube-public
            - kube-node-lease
            # platform infrastructure — use upstream registries, excluded from deny
            - gatekeeper-system
            - metallb-system
            - longhorn-system
            - nfs-provisioner
            - cert-manager
            - ingress-nginx
            - chaos-mesh
            - velero
            - falco
            - argocd
            - authentik
            - monitoring
            - harbor
            - vault
            - external-secrets
            - keda
            - ai
            - messaging
            - nextcloud
            - observability
            - polaris
            - langfuse
  parameters:
    registries:
      # Private registry — platform images
      - "harbor.10.0.0.200.nip.io/"
      - "harbor.devandre.sbs/"
      # Curated public registries — known trusted sources only
      - "docker.io/"
      - "ghcr.io/"
      - "quay.io/"
      - "registry.k8s.io/"
      - "oci.external-secrets.io/"
      - "ecr-public.aws.com/"
      # Plane CE — makeplane's own registry, no Harbor mirror available
      - "artifacts.plane.so/"
