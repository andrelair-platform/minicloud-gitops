apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireResourceLimits
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: require-resource-limits
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - gatekeeper-system
            - cert-manager
            - longhorn-system
            - monitoring       # prometheus-operator sidecars don't set limits by design
            - observability    # loki/tempo infra
            - metallb-system
            - ingress
            - chaos-mesh
            - velero
            - harbor           # multi-service chart; LimitRange injects runtime defaults
            - messaging        # nats reloader/prom-exporter sidecars; LimitRange covers runtime
            - nfs-provisioner  # infrastructure component with variable I/O
            - productivity
            - argo-rollouts
            - vpa-system
            - system-upgrade     # Plane CE bundled PG/Redis/RabbitMQ/MinIO StatefulSets don't expose resource limits in values
            - chat              # matrix-synapse signing key job (batch/v1 Job) has no resource limits in chart defaults
