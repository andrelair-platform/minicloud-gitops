apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sNoPrivilegeEscalation
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: no-privilege-escalation
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - gatekeeper-system
            - metallb-system
            - longhorn-system
            - chaos-mesh
            - falco
            - velero
            - monitoring      # node-exporter needs host process namespace — cannot set allowPrivilegeEscalation: false
            - nextcloud       # Bitnami chart init containers run as root
            - nfs-provisioner # NFS provisioner requires elevated privileges
            - authentik       # Bitnami chart init containers
