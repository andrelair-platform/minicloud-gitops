---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: searxng
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: searxng
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# DNS resolution — required for SearXNG to resolve search engine hostnames
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: searxng
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Open WebUI (in ai namespace) queries SearXNG on port 8080
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-open-webui
  namespace: searxng
spec:
  podSelector:
    matchLabels:
      app: searxng
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai
      ports:
        - port: 8080
---
# Internet egress — SearXNG must reach Google, Bing, DuckDuckGo, Wikipedia
# Only the searxng pod gets this egress; default-deny-egress blocks everything else
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internet-egress
  namespace: searxng
spec:
  podSelector:
    matchLabels:
      app: searxng
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
