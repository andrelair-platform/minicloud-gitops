apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      automountServiceAccountToken: false
      # Prevent k8s from injecting SEARXNG_PORT=tcp://... service env vars —
      # SearXNG uses SEARXNG_PORT for its listen port; the injected value is not
      # a valid integer and crashes granian on startup.
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 977
        runAsGroup: 977
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:2026.7.3-747cec4c2
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_SETTINGS_PATH
              value: /etc/searxng/settings.yml
            - name: SEARXNG_SECRET
              value: "minicloud-searxng-secret-2026"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: searxng-config
