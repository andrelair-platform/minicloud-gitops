---
# JVB XMPP auth credentials — keys: JVB_AUTH_USER, JVB_AUTH_PASSWORD
# Vault path: secret/platform/jitsi  keys: jvb-auth-user, jvb-auth-password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jitsi-jvb-secret
  namespace: collab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jitsi-jvb-secret
    creationPolicy: Owner
  data:
    - secretKey: JVB_AUTH_USER
      remoteRef:
        key: secret/platform/jitsi
        property: jvb-auth-user
    - secretKey: JVB_AUTH_PASSWORD
      remoteRef:
        key: secret/platform/jitsi
        property: jvb-auth-password
---
# Jicofo XMPP auth credentials — key: JICOFO_AUTH_PASSWORD
# Vault path: secret/platform/jitsi  key: jicofo-auth-password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jitsi-jicofo-secret
  namespace: collab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jitsi-jicofo-secret
    creationPolicy: Owner
  data:
    - secretKey: JICOFO_AUTH_PASSWORD
      remoteRef:
        key: secret/platform/jitsi
        property: jicofo-auth-password
